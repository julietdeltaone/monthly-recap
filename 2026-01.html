<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD Monthly Recap</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0A0C10;
    --bg-card: #12151C;
    --bg-card-hover: #171B24;
    --border: rgba(255,255,255,.07);
    --border-hover: rgba(255,255,255,.13);
    --text: #E4E4E7;
    --text-soft: #A1A1AA;
    --text-muted: #63636E;
    --text-faint: #3F3F46;
    --accent: #3B82F6;
    --accent-bg: rgba(59,130,246,.08);
    --accent-glow: rgba(59,130,246,.25);
    --green: #22C55E;
    --green-bg: rgba(34,197,94,.08);
    --cyan: #06B6D4;
    --cyan-bg: rgba(6,182,212,.08);
    --red: #EF4444;
    --orange: #F59E0B;
    --purple: #A855F7;

    --sans: 'DM Sans', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- LAYOUT SHELL ---- */
  .shell {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  /* ---- HEADER ---- */
  .hdr {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .hdr-left { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  .hdr h1 {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    line-height: 1;
    color: var(--text);
  }
  .hdr .month-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .hdr-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* ---- TABS / PILLS ---- */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 20px 0 0;
    flex-wrap: wrap;
  }
  .tab {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 8px 14px;
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s ease;
  }
  .tab:hover { color: var(--text-soft); border-color: var(--border-hover); }
  .tab.on {
    color: var(--accent);
    border-color: rgba(59,130,246,.3);
    background: var(--accent-bg);
  }

  .pill {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s ease;
  }
  .pill:hover { border-color: var(--border-hover); color: var(--text-soft); }
  .pill.on {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }



  /* ---- GRID ---- */
  .dash {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
    margin-top: 24px;
    align-items: start;
  }
  @media (max-width: 860px) { .dash { grid-template-columns: 1fr; } }

  /* ---- SIDEBAR ---- */
  .side { display: flex; flex-direction: column; gap: 20px; }

  .stat-group { }
  .stat-group-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .stat-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-item:last-child { border-bottom: none; }
  .stat-k {
    font-size: 13px;
    color: var(--text-muted);
  }
  .stat-v {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .highlights-section { }
  .highlight-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    margin: 0 6px 6px 0;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    font-size: 12px;
    color: var(--text-soft);
    background: rgba(255,255,255,.03);
  }
  .highlight-chip .hdot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
  }

  .side-foot {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    display: flex;
    justify-content: space-between;
  }

  /* ---- MAIN CONTENT ---- */
  .content { min-width: 0; }

  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 860px) { .content-grid { grid-template-columns: 1fr; } }
  .span-full { grid-column: 1 / -1; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 20px;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .card:hover {
    border-color: var(--border-hover);
    box-shadow: 0 4px 24px rgba(0,0,0,.3);
  }

  .card-head {
    margin-bottom: 16px;
  }
  .card-title {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    line-height: 1.2;
    color: var(--text);
  }
  .card-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .chart-wrap {
    position: relative;
    width: 100%;
  }
  .chart-wrap canvas {
    width: 100% !important;
  }

  /* ---- NOTES LIST ---- */
  .note-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s;
  }
  .note-row:last-child { border-bottom: none; }
  .note-row:hover { background: var(--accent-bg); margin: 0 -12px; padding: 12px; border-radius: var(--r-sm); }
  .note-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .note-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    line-height: 1.4;
  }
  .note-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--accent);
    white-space: nowrap;
    padding-top: 2px;
  }

  /* ---- CALENDAR (spiritual) ---- */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    font-size: 12px;
  }
  .cal-dow {
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 6px 0;
  }
  .cal-day {
    text-align: center;
    padding: 6px 2px;
    border-radius: var(--r-sm);
    color: var(--text-muted);
    font-size: 11px;
    font-family: var(--mono);
  }
  .cal-day.hl-sermon {
    color: #fff;
    font-weight: 600;
    cursor: pointer;
  }
  .cal-day.hl-sermon .cal-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .cal-day.hl-sermon:hover .cal-num {
    transform: scale(1.15);
    box-shadow: 0 0 14px var(--accent-glow);
  }
  .cal-day.hl-reading {
    color: #fff;
    font-weight: 600;
  }
  .cal-day.hl-reading .cal-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px rgba(34,197,94,.3);
  }
  .cal-day.empty { visibility: hidden; }
  .cal-legend {
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .cal-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cal-legend .ldot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .cal-legend .ldot-sermon { background: var(--accent); }
  .cal-legend .ldot-reading { background: var(--green); }

  /* ---- MODAL ---- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border-hover);
    border-radius: var(--r-lg);
    width: min(640px, calc(100vw - 32px));
    max-height: 80vh;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,.5);
    animation: modalIn .18s ease-out;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-head h3 {
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .modal-head p { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .modal-close {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    background: none;
    cursor: pointer;
    color: var(--text-muted);
    transition: all .12s;
  }
  .modal-close:hover { border-color: var(--border-hover); color: var(--text); }
  .modal-body {
    padding: 20px;
    overflow-y: auto;
    max-height: calc(80vh - 80px);
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-soft);
  }
  .modal-body p { margin: 10px 0; }
  .modal-body ul { margin: 10px 0; padding-left: 20px; }
  .modal-body li { margin: 5px 0; }
  .modal-body b { color: var(--text); }

  /* ---- TOAST ---- */
  .toast-msg {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 16px;
    background: var(--accent);
    color: #fff;
    border-radius: var(--r-sm);
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s, transform .18s;
    z-index: 99999;
  }
  .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---- SELECTION LINE ---- */
  .sel-block {
    padding: 14px 16px;
    border-left: 2px solid var(--accent);
    background: var(--accent-bg);
    border-radius: 0 var(--r-sm) var(--r-sm) 0;
  }
  .sel-line {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .sel-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ---- MARK STUDY SIDEBAR ---- */
  .mark-study {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 20px;
    position: sticky;
    top: 16px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,.08) transparent;
  }
  .mark-study::-webkit-scrollbar { width: 4px; }
  .mark-study::-webkit-scrollbar-track { background: transparent; }
  .mark-study::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
  .mark-study-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .mark-study-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.3px;
  }
  .mark-study-body {
    margin-top: 16px;
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text-soft);
  }
  .mark-study-body p { margin: 8px 0; }
  .mark-study-body em { color: var(--text); font-style: italic; }
  .mark-study-body strong { color: var(--text); }
  .mark-section {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .mark-section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .mark-item {
    font-size: 12px;
    color: var(--text-soft);
    padding: 3px 0;
    line-height: 1.5;
  }
  .mark-ref {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    display: inline-block;
    min-width: 72px;
  }
  .mark-greek {
    font-style: italic;
    color: var(--cyan);
  }

  /* ---- FINANCIAL CATEGORY ACCORDION ---- */
  .fin-categories { display: flex; flex-direction: column; gap: 2px; }
  .fin-cat {
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    overflow: hidden;
    transition: border-color .15s;
  }
  .fin-cat:hover { border-color: var(--border-hover); }
  .fin-cat-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    background: rgba(255,255,255,.02);
    transition: background .12s;
    gap: 12px;
  }
  .fin-cat-head:hover { background: rgba(255,255,255,.04); }
  .fin-cat-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .fin-cat-arrow {
    font-size: 10px;
    color: var(--text-faint);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .fin-cat.open .fin-cat-arrow { transform: rotate(90deg); }
  .fin-cat-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .fin-cat-note {
    font-size: 11px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fin-cat-amt {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }
  .fin-cat-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin: 0 14px;
  }
  .fin-cat-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width .3s ease;
  }
  .fin-cat-body {
    display: none;
    padding: 0 14px 12px;
  }
  .fin-cat.open .fin-cat-body { display: block; }
  .fin-tx {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,.03);
  }
  .fin-tx:last-child { border-bottom: none; }
  .fin-tx-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    width: 44px;
    flex-shrink: 0;
  }
  .fin-tx-desc {
    color: var(--text-muted);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 8px;
  }
  .fin-tx-amt {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-soft);
    white-space: nowrap;
  }
  .fin-tx-label {
    font-size: 11px;
    color: var(--text-faint);
    font-style: italic;
    padding: 5px 0;
  }

  /* ---- SERMON TWO-COLUMN LAYOUT ---- */
  .sermon-block {
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background: var(--bg-card);
    overflow: hidden;
    transition: border-color .2s;
  }
  .sermon-block:hover { border-color: var(--border-hover); }
  .sermon-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sermon-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .sermon-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }
  .sermon-cols {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    min-height: 0;
    height: 520px;
  }
  @media (max-width: 860px) {
    .sermon-cols { grid-template-columns: 1fr; height: auto; }
  }
  .sermon-col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sermon-col-label {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 14px 20px 10px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sermon-col-scroll {
    padding: 16px 20px 20px;
    overflow-y: auto;
    overscroll-behavior: contain;
    flex: 1;
    min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,.1) transparent;
    /* prose styles for content */
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-soft);
  }
  .sermon-col-scroll::-webkit-scrollbar { width: 5px; }
  .sermon-col-scroll::-webkit-scrollbar-track { background: transparent; }
  .sermon-col-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }
  .sermon-col-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }
  .sermon-col + .sermon-col {
    border-left: 1px solid var(--border);
  }
  @media (max-width: 860px) {
    .sermon-col + .sermon-col { border-left: none; border-top: 1px solid var(--border); }
    .sermon-col-scroll { max-height: 400px; }
  }
  .sermon-col-label.lbl-notes { color: var(--accent); }
  .sermon-col-label.lbl-commentary { color: var(--green); }
  .sermon-prose {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-soft);
  }
  .sermon-prose p { margin: 0 0 12px; }
  .sermon-prose p:last-child { margin-bottom: 0; }
  .sermon-prose h4 {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin: 18px 0 6px;
    letter-spacing: 0.2px;
  }
  .sermon-prose h4:first-child { margin-top: 0; }
  .sermon-questions {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .sermon-questions-label {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 10px;
  }
  .sermon-questions ul {
    list-style: none;
    padding: 0;
  }
  .sermon-questions li {
    font-size: 12px;
    color: var(--text-soft);
    line-height: 1.6;
    padding: 5px 0 5px 16px;
    position: relative;
  }
  .sermon-questions li::before {
    content: '\203A';
    position: absolute;
    left: 0;
    color: var(--orange);
    font-weight: 600;
    font-size: 15px;
    line-height: 1.3;
  }
  .sermon-spacer { height: 16px; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up {
    animation: fadeUp .3s ease-out both;
  }
  .fade-up-1 { animation-delay: .05s; }
  .fade-up-2 { animation-delay: .1s; }
  .fade-up-3 { animation-delay: .15s; }
  .fade-up-4 { animation-delay: .2s; }

  /* ---- WORKOUT HEATMAP (physical sidebar) ---- */
  .heatmap-wrap { margin-top: 4px; }
  .heatmap-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .heatmap-grid {
    display: grid;
    grid-template-columns: 28px repeat(7,1fr);
    gap: 3px;
    font-size: 10px;
  }
  .hm-dow {
    text-align: center;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    padding-bottom: 3px;
  }
  .hm-week-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 4px;
  }
  .hm-cell {
    aspect-ratio: 1;
    border-radius: 3px;
    background: var(--border);
    position: relative;
    cursor: default;
  }
  .hm-cell.rest { background: rgba(255,255,255,.04); }
  .hm-cell[data-groups] { cursor: pointer; }
  .hm-cell:hover .hm-tooltip { display: block; }
  .hm-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #1e2433;
    border: 1px solid var(--border-hover);
    border-radius: var(--r-sm);
    padding: 6px 8px;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
    font-family: var(--mono);
  }
  .hm-legend {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .hm-legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--text-muted);
  }
  .hm-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ---- INTELLECTUAL LAYOUT ---- */
  .intel-wrap { display: flex; flex-direction: column; gap: 16px; }
  .intel-header {
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(59,130,246,.08), rgba(168,85,247,.06));
    border: 1px solid rgba(59,130,246,.2);
    border-radius: var(--r-lg);
  }
  .intel-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .intel-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }
  .intel-tagline {
    font-size: 13px;
    color: var(--text-soft);
    margin-top: 10px;
    line-height: 1.55;
  }
  .intel-pillars {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .intel-pillar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px;
    transition: border-color .15s;
  }
  .intel-pillar:hover { border-color: var(--border-hover); }
  .intel-pillar-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .intel-pillar-label.lbl-foundation { color: var(--accent); }
  .intel-pillar-label.lbl-engine     { color: var(--green); }
  .intel-pillar-label.lbl-control    { color: var(--orange); }
  .intel-pillar-label.lbl-resilience { color: var(--purple); }
  .intel-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
    gap: 8px;
  }
  .intel-row:last-child { border-bottom: none; }
  .intel-row-k {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .intel-row-v {
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    line-height: 1.4;
  }
  .intel-risks {
    background: var(--bg-card);
    border: 1px solid rgba(239,68,68,.2);
    border-radius: var(--r-md);
    padding: 14px;
  }
  .intel-risks-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 10px;
  }
  .intel-risk-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
    color: var(--text-muted);
  }
  .intel-risk-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    margin-top: 3px;
  }
  .intel-stable {
    background: var(--bg-card);
    border: 1px solid rgba(34,197,94,.2);
    border-radius: var(--r-md);
    padding: 14px;
  }
  .intel-stable-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 10px;
  }
  .intel-stable-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
    color: var(--text-muted);
  }
  .intel-stable-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    margin-top: 3px;
  }
  .intel-core-rule {
    padding: 14px 16px;
    border-left: 3px solid var(--accent);
    background: var(--accent-bg);
    border-radius: 0 var(--r-md) var(--r-md) 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
  }
  .intel-core-rule span {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent);
    display: block;
    margin-bottom: 5px;
  }
  .intel-verdict {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px;
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text-soft);
  }
  .intel-verdict-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 8px;
  }


  /* ---- CREATIVE / PHOTOGRAPHY ---- */
  .creative-wrap { display: flex; flex-direction: column; gap: 20px; }
  .creative-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
  }
  .creative-meta { flex: 1; }
  .creative-project-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .creative-project-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }
  .creative-desc {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text-soft);
  }
  .creative-stats-row {
    display: flex;
    gap: 20px;
    margin-top: 14px;
  }
  .creative-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .creative-stat-v {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    font-family: var(--mono);
  }
  .creative-stat-k {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .creative-gallery-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .creative-grid-7 {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .creative-grid-6 {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }
  .headshot-card {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .headshot-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    object-position: top center;
    border-radius: var(--r-md);
    border: 1px solid var(--border);
    display: block;
  }
  .headshot-name {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .creative-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0;
  }


  /* ---- OVERVIEW LANDING PAGE ---- */
  .ov-wrap { display: flex; flex-direction: column; gap: 16px; }

  /* Month banner */
  .ov-banner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px;
    background: linear-gradient(135deg, rgba(59,130,246,.10) 0%, rgba(168,85,247,.07) 100%);
    border: 1px solid rgba(59,130,246,.22);
    border-radius: var(--r-lg);
    gap: 20px;
  }
  .ov-banner-left { flex: 1; }
  .ov-banner-month {
    font-size: 26px; font-weight: 800; color: var(--text);
    letter-spacing: -0.5px; line-height: 1.1;
  }
  .ov-banner-sub {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-muted); margin-top: 4px; letter-spacing: 0.3px;
  }
  .ov-kpi-row {
    display: flex; gap: 24px; flex-shrink: 0;
  }
  .ov-kpi {
    display: flex; flex-direction: column; align-items: flex-end; gap: 1px;
  }
  .ov-kpi-v {
    font-size: 20px; font-weight: 700; font-family: var(--mono);
    color: var(--text);
  }
  .ov-kpi-v.green { color: var(--green); }
  .ov-kpi-v.red   { color: var(--red); }
  .ov-kpi-k { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* Two-col layout for main body */
  .ov-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ov-col  { display: flex; flex-direction: column; gap: 12px; }

  /* Section cards */
  .ov-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px 16px;
    transition: border-color .15s;
  }
  .ov-section:hover { border-color: var(--border-hover); }
  .ov-section-label {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 1.1px; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .ov-section-label.lbl-health    { color: #34d399; }
  .ov-section-label.lbl-finance   { color: var(--accent); }
  .ov-section-label.lbl-physical  { color: #f59e0b; }
  .ov-section-label.lbl-admin     { color: #a78bfa; }
  .ov-section-label.lbl-creative  { color: #f472b6; }
  .ov-section-label.lbl-spiritual { color: #fb923c; }
  .ov-section-label.lbl-intel     { color: #60a5fa; }

  .ov-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.04); gap: 8px;
  }
  .ov-row:last-child { border-bottom: none; }
  .ov-row-k { font-size: 12px; color: var(--text-soft); }
  .ov-row-v { font-size: 12px; font-weight: 600; color: var(--text); text-align: right; }
  .ov-row-v.ok   { color: var(--green); }
  .ov-row-v.warn { color: var(--orange); }
  .ov-row-v.bad  { color: var(--red); }
  .ov-row-v.dim  { color: var(--text-muted); font-weight: 400; }

  /* Admin / events list */
  .ov-event {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.04);
    font-size: 12px;
  }
  .ov-event:last-child { border-bottom: none; }
  .ov-event-date {
    font-family: var(--mono); font-size: 10px; color: var(--text-faint);
    white-space: nowrap; flex-shrink: 0; width: 58px; padding-top: 2px;
  }
  .ov-event-desc { color: var(--text-soft); line-height: 1.4; }
  .ov-event-desc b { color: var(--text); font-weight: 600; }
  .ov-event-tag {
    font-family: var(--mono); font-size: 9px; padding: 2px 5px;
    border-radius: 3px; flex-shrink: 0; margin-left: auto;
    font-weight: 500; letter-spacing: 0.5px;
  }
  .tag-done    { background: rgba(34,197,94,.15);  color: var(--green); }
  .tag-cancel  { background: rgba(239,68,68,.12);  color: var(--red); }
  .tag-miss    { background: rgba(251,146,60,.12); color: var(--orange); }
  .tag-follow  { background: rgba(99,102,241,.15); color: #818cf8; }

  /* Vitals strip */
  .ov-vitals {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-top: 4px;
  }
  .ov-vital {
    background: rgba(255,255,255,.03);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 8px 10px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .ov-vital-v { font-size: 14px; font-weight: 700; color: var(--text); font-family: var(--mono); }
  .ov-vital-k { font-size: 10px; color: var(--text-muted); }
  .ov-vital-flag { font-size: 9px; color: var(--orange); margin-top: 1px; }

  /* Full-width bottom section */
  .ov-full { grid-column: span 2; }


  /* ════════════════════════════════════════
     MOBILE RESPONSIVE — 480px / 640px / 860px
     ════════════════════════════════════════ */

  /* Fluid shell padding */
  @media (max-width: 640px) {
    .shell { padding: 16px 14px; }
    .hdr { padding-bottom: 16px; gap: 10px; }
    .hdr h1 { font-size: 18px; }
    .hdr-right { gap: 6px; }
    .pill { padding: 6px 10px; font-size: 10px; }
    .tabs { gap: 3px; padding-top: 14px; }
    .tab  { padding: 7px 10px; font-size: 10px; }
  }

  /* Dash: stack sidebar above main on mobile */
  @media (max-width: 860px) {
    .dash {
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    /* On mobile sidebar comes AFTER main content */
    .side  { order: 2; }
    .content { order: 1; }
  }

  /* Cards */
  @media (max-width: 640px) {
    .card { padding: 14px; border-radius: var(--r-md); }
    .card-head { margin-bottom: 12px; }
    .content-grid { gap: 12px; }
  }

  /* Overview banner */
  @media (max-width: 640px) {
    .ov-banner { flex-direction: column; gap: 14px; padding: 14px 16px; }
    .ov-kpi-row { justify-content: space-between; width: 100%; }
    .ov-kpi { align-items: flex-start; }
    .ov-kpi-v { font-size: 16px; }
    .ov-cols { grid-template-columns: 1fr; }
    .ov-full { grid-column: span 1; }
    .ov-vitals { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 641px) and (max-width: 860px) {
    .ov-cols { grid-template-columns: 1fr 1fr; }
    .ov-vitals { grid-template-columns: repeat(4, 1fr); }
  }

  /* Financial accordion */
  @media (max-width: 860px) {
    .fin-tx { flex-wrap: wrap; gap: 2px; }
    .fin-tx-date { width: 36px; font-size: 10px; }
    .fin-tx-desc { min-width: 0; font-size: 11px; white-space: normal; word-break: break-word; padding: 0 4px; }
    .fin-tx-amt  { font-size: 11px; margin-left: auto; }
    .fin-cat-head { padding: 10px 12px; }
    .fin-cat-name { font-size: 12px; }
    .fin-cat-amt  { font-size: 12px; min-width: 52px; }
    .fin-cat-note { font-size: 10px; }
  }
  @media (max-width: 640px) {
    .fin-layout { grid-template-columns: 1fr !important; }
    .fin-main { min-width: 0; }
    .fin-cat-body { padding: 6px 10px; }
    .fin-tx-label { font-size: 10px; }
  }

  /* Physical: heatmap cells readable on small screens */
  @media (max-width: 480px) {
    .heatmap-grid { gap: 2px; }
    .hm-week-label { width: 20px; font-size: 8px; }
    .hm-dow { font-size: 8px; }
    .hm-legend { gap: 6px; }
    .hm-legend-item { font-size: 9px; }
  }

  /* Intellectual pillars: 4-col → 2-col → 1-col on small */
  @media (max-width: 480px) {
    .intel-pillars { grid-template-columns: 1fr; }
  }
  @media (min-width: 481px) and (max-width: 860px) {
    .intel-pillars { grid-template-columns: 1fr 1fr; }
  }

  /* Creative headshot grids: shrink gracefully */
  @media (max-width: 640px) {
    .creative-grid-7 { grid-template-columns: repeat(4, 1fr); }
    .creative-grid-6 { grid-template-columns: repeat(3, 1fr); }
    .creative-stats-row { flex-wrap: wrap; gap: 12px; }
  }
  @media (max-width: 400px) {
    .creative-grid-7 { grid-template-columns: repeat(3, 1fr); }
    .creative-grid-6 { grid-template-columns: repeat(3, 1fr); }
  }

  /* Sermon modal */
  @media (max-width: 640px) {
    .modal-inner {
      padding: 20px 16px;
      max-height: 90vh;
      border-radius: var(--r-md) var(--r-md) 0 0;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      top: auto;
      transform: none !important;
      width: 100%;
      max-width: 100%;
    }
  }

  /* Stat items on sidebar */
  @media (max-width: 640px) {
    .stat-item { padding: 7px 0; }
    .stat-v { font-size: 12px; }
    .stat-k { font-size: 11px; }
  }

  /* Charts: don't let them go too tall on mobile */
  @media (max-width: 640px) {
    canvas { max-height: 220px !important; }
    .span-full { grid-column: span 1; }
  }

  /* Highlight chips wrap nicely */
  @media (max-width: 640px) {
    .highlights-section { display: flex; flex-wrap: wrap; gap: 6px; }
    .highlight-chip { font-size: 11px; }
  }


  /* ---- INTEL DOC LINK ---- */
  .intel-doc-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(59,130,246,.12), rgba(99,102,241,.08));
    border: 1px solid rgba(59,130,246,.35);
    border-radius: var(--r-lg);
    text-decoration: none;
    transition: all .2s ease;
    margin-bottom: 4px;
  }
  .intel-doc-link:hover {
    background: linear-gradient(135deg, rgba(59,130,246,.20), rgba(99,102,241,.14));
    border-color: rgba(59,130,246,.6);
    transform: translateY(-1px);
  }
  .intel-doc-icon {
    font-size: 28px;
    flex-shrink: 0;
    line-height: 1;
  }
  .intel-doc-text { flex: 1; min-width: 0; }
  .intel-doc-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
  }
  .intel-doc-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }
  .intel-doc-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 4px 8px;
    background: rgba(59,130,246,.2);
    border: 1px solid rgba(59,130,246,.35);
    border-radius: var(--r-sm);
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }


  /* ---- CREATIVE MISSED SECTION ---- */
  .creative-missed {
    margin-top: 16px;
    padding: 14px 18px;
    background: rgba(251,146,60,.06);
    border: 1px solid rgba(251,146,60,.22);
    border-radius: var(--r-md);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .creative-missed-icon {
    font-size: 22px;
    flex-shrink: 0;
    line-height: 1;
    margin-top: 1px;
  }
  .creative-missed-body { flex: 1; }
  .creative-missed-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--orange);
    margin-bottom: 3px;
  }
  .creative-missed-detail {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .creative-missed-tag {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    padding: 3px 7px;
    background: rgba(251,146,60,.15);
    border: 1px solid rgba(251,146,60,.3);
    border-radius: 3px;
    color: var(--orange);
    flex-shrink: 0;
    align-self: center;
    letter-spacing: 0.5px;
  }

</style>

              id:"sermon-jan4",
              date:"January 4, 2026",
              title:"Acts 1 \u2014 Waiting for the Promise",
              tag:"Jan 4",
              substance:"<p>Brad opened by challenging congregations to examine Acts 1 and honestly assess whether their church reflects the pattern shown there.</p><h4>\u201cDon\u2019t depart \u2014 wait for the promise of the Father\u201d</h4><p>Jesus commanded the disciples not to leave Jerusalem but to wait for the Holy Spirit (Acts 1:4). The waiting wasn\u2019t passive \u2014 it was active preparation to have their strength renewed before attempting any ministry.</p><h4>The Spirit intercedes perfectly</h4><p>The Holy Spirit knows the perfect prayer and will pray for you according to Romans 8:26\u201327. Believers need Spirit-led intercession, not self-generated religious activity.</p><h4>Misplaced questions</h4><p>The disciples asked, \u201cLord, will you restore the kingdom of Israel?\u201d \u2014 revealing their focus on political restoration (Acts 1:6). Jesus redirected them: \u201cIt is not for you to know times or seasons.\u201d Their job was to receive power and be witnesses, not to figure out God\u2019s timeline.</p><h4>Christ is coming back for His bride</h4><p>Jesus will return for a bride who has been faithfully waiting with proper priorities \u2014 not distracted by wrong questions or worldly concerns.</p><h4>Waiting on God is not like waiting for a pizza</h4><p>True waiting requires active spiritual preparation and engagement. The disciples went to the upper room, deliberately removing themselves from distractions. This intentional environment was crucial. They prayed for something that would shake them to their core \u2014 not comfortable feelings or minor improvements, but transformation so profound it would fundamentally change them.</p><h4>Peter\u2019s transformation</h4><p><b>Pre-Spirit:</b> Denied Christ three times despite close ministry exposure.<br><b>Post-Spirit:</b> Preached boldly, resulting in 3,000 baptisms in one day.<br>The difference was Spirit-filling received after waiting \u2014 not emotional commitment or religious training.</p><h4>The 75% problem</h4><p>Brad claims three-quarters of American Christians lack genuine Spirit-filling. The result: emotional roller-coaster faith, church attendance without heart change, and recurring struggles without lasting transformation \u2014 all because they\u2019ve missed the Acts 1 pattern.</p><h4>Personal story (January 26, 1996)</h4><p>Brad shared his breaking point after cycles of emotional youth camp highs (lasting about two weeks) followed by doubt and rebellion. Despite anger at God, he committed to genuinely serving if God showed up \u2014 and that moment became a real turning point toward Spirit-led transformation.</p><h4>Forgiveness as proof</h4><p>Brad\u2019s controversial claim: inability to forgive equals not truly saved. No exceptions. Forgiveness is mandatory evidence of the Spirit\u2019s work, not optional. A deacon board chairman\u2019s public repentance showed that church position doesn\u2019t equal Spirit presence.</p><h4>Every believer must be Spirit-led</h4><p>Every believer needs direct Holy Spirit guidance \u2014 not committee decisions or institutional control. Christ\u2019s death gave instant access to God for individual discernment over traditional top-down authority.</p><h4>Honest struggles</h4><p>Brad admits personal difficulties with commands like \u201cturn the other cheek.\u201d He acknowledges cultural and temperamental barriers that require Spirit intervention, making the case that Spirit-empowerment is practical necessity, not optional theology.</p>",
              commentary:"<p>If Acts 1 is the template, my primary question becomes whether my activity outpaces my dependence. Am I trying to produce outcomes without first seeking empowerment?</p><p>The emphasis on waiting exposes discomfort with silence, uncertainty, and lack of control. Peter\u2019s transformation suggests that failure is not disqualifying but preparation for Spirit-enabled usefulness.</p><p>The hard claim linking forgiveness to salvation forces examination of unresolved resentment: Is withholding forgiveness a functional denial of grace? Practically, what would \u201cremoving distractions\u201d look like in a modern life structured around constant input? If true power comes from surrender rather than effort, then productivity without spiritual alignment may be spiritually hollow.</p>",
              questions:[
                "Is my activity outpacing my dependence on the Spirit?",
                "What would \u2018removing distractions\u2019 look like in a life built around constant input?",
                "Is withholding forgiveness a functional denial of grace?"
              ]
            },
            {
              id:"sermon-jan11",
              date:"January 11, 2026",
              title:"Acts 2 \u2014 The Day of Pentecost",
              tag:"Jan 11",
              substance:"<p>Brad focused on the day the Holy Spirit came upon the believers gathered in Jerusalem \u2014 the fulfillment of the promise Jesus told them to wait for in Acts 1.</p><h4>\u201cOne accord, one place\u201d</h4><p>The believers were gathered in one accord (unity of purpose) and in one physical place when the Spirit came (Acts 2:1). Their unity and obedience to wait together was essential to receiving what God had promised.</p><h4>All were filled</h4><p>Every person present shared the same singular focus: receiving the promised Holy Spirit. When the Spirit came, all of them were filled \u2014 not just the leaders or the spiritually elite, but everyone who had gathered and waited.</p><h4>The fruits of the Spirit</h4><p>Brad emphasized that Spirit-filling produces visible fruit in believers\u2019 lives (Galatians 5:22\u201323). The evidence of genuine Spirit presence isn\u2019t just emotional experiences but transformed character \u2014 love, joy, peace, patience, kindness, goodness, faithfulness, gentleness, and self-control.</p><h4>\u201cWe can all be filled. We don\u2019t have to try.\u201d</h4><p>Spirit-filling is available to every believer, not just certain people or special Christians. It\u2019s not about human effort or trying harder \u2014 it\u2019s about yielding and receiving what God freely offers.</p><h4>Honesty about sin</h4><p>Genuine encounter with God requires brutal honesty about our sin, not religious pretense or minimizing. Coming to God means dropping the masks and admitting the full truth of our condition.</p><h4>Freedom from guilt</h4><p>God\u2019s purpose isn\u2019t to keep us trapped in shame but to liberate us completely from sin\u2019s guilt. The Spirit\u2019s work brings true freedom \u2014 not just forgiveness that leaves us still feeling condemned.</p><h4>Forgiveness and the cross</h4><p>When you can\u2019t forgive, you\u2019re saying that the cross is not enough. Refusing to forgive others is essentially declaring that Christ\u2019s sacrifice was insufficient. If the cross was enough to forgive our sins, then it\u2019s enough for us to extend that same forgiveness to those who\u2019ve wronged us \u2014 anything less denies the power of what Jesus accomplished.</p>",
              commentary:"<p>Unity and shared purpose preceded empowerment, raising the question of whether isolation weakens spiritual life. If fruit \u2014 not feelings \u2014 is the evidence, then character change becomes the true diagnostic.</p><p>Am I measuring growth by internal experiences or external transformation? The call to honesty about sin challenges tendencies toward self-justification. Freedom from guilt implies that lingering condemnation may reflect unbelief in forgiveness rather than humility.</p><p>The forgiveness issue surfaces again: Do I subconsciously rank sins, granting grace selectively? If yielding is the pathway, what specific areas of control am I unwilling to surrender?</p>",
              questions:[
                "Am I measuring growth by feelings or by actual character change?",
                "Do I subconsciously rank sins, granting grace selectively?",
                "What specific areas of control am I unwilling to surrender?"
              ]
            },
            {
              id:"sermon-jan25",
              date:"January 25, 2026",
              title:"Peter & Authentic Faith",
              tag:"Jan 25",
              substance:"<p>Peter denied Jesus three times the night of Jesus\u2019s arrest (Matthew 26:69\u201375) despite close ministry experience with Christ. After receiving the Holy Spirit at Pentecost, Peter preached boldly (Acts 2), leading to 3,000 souls baptized in a single day \u2014 demonstrating that the Spirit transformed Peter from fearful denial into bold proclamation.</p><h4>Appearance vs. reality</h4><p>Many people claim to be Christians and look the part externally \u2014 church attendance, religious language, biblical knowledge. However, they adopt biblical principles without genuine heart change or Spirit empowerment. The real test is whether private life matches public profession.</p><h4>Knowledge without relationship</h4><p>You can quote the Bible but not have a relationship with God. Biblical knowledge doesn\u2019t equal knowing God personally. You can memorize Scripture and adopt Christian principles without authentic relationship with the Spirit \u2014 this is behavior modification, not transformation.</p><h4>The Spirit makes the difference</h4><p>It\u2019s not knowledge, behavior, or appearance \u2014 it\u2019s Spirit presence that transforms. The indwelling Spirit is the dividing line between religious activity and genuine Christianity, enabling believers to overcome fear and live with conviction.</p><h4>Emotional highs fade</h4><p>You can have emotional experiences that shake you up for a few weeks then fade out. Brad\u2019s youth experience revealed these emotional highs at camps often last only about two weeks, leading to repeated cycles of doubt. These feelings inevitably fade without the Spirit\u2019s sustaining power.</p><h4>Principles work without belief</h4><p>It\u2019s possible to live the principles of Christ without believing in the power of Him. Christ\u2019s principles function even for unbelievers \u2014 that\u2019s why non-Christians can live successful, moral lives. Following principles like honesty, generosity, and kindness produces good results whether you believe or not.</p><h4>All or nothing</h4><p>You can\u2019t pick and choose which parts of the gospel you want to live. Selective Christianity doesn\u2019t work. The gospel demands complete surrender, not customization to personal preferences. True faith requires total commitment \u2014 half-hearted Christianity that picks favorite parts while rejecting difficult truths isn\u2019t genuine faith at all. It\u2019s the Spirit-filled life that produces lasting transformation, not emotional experiences or religious activity.</p>",
              commentary:"<p>This message confronts the gap between appearance and reality. If principles \u201cwork\u201d regardless of belief, then external success cannot confirm spiritual health. The distinction between behavior modification and transformation suggests I should examine motivations, not just actions.</p><p>Do I rely on knowledge as a substitute for relationship? The warning against selective faith challenges comfort-based spirituality \u2014 accepting encouragement while avoiding costly obedience. Peter\u2019s story implies that boldness flows from assurance of forgiveness and presence, not personality traits.</p><p>Practically, what would \u201call or nothing\u201d look like in daily decisions, priorities, and identity? Where am I negotiating rather than surrendering?</p>",
              questions:[
                "Do I rely on knowledge as a substitute for relationship with God?",
                "Am I accepting encouragement while avoiding costly obedience?",
                "Where am I negotiating rather than surrendering?"
              ]
            }

  // ===== STATE =====
  let curMonth = null, curDash = null;
  let c1 = null, c2 = null;

  // ===== DOM =====
  const $ = id => document.getElementById(id);
  const monthLabel = $('monthLabel');
  const monthBtns = $('monthBtns');
  const dashTabs = $('dashTabs');
  const sidebar = $('sidebar');
  const mainContent = $('mainContent');
  const overlay = $('overlay');
  const mClose = $('mClose');
  const toastEl = $('toast');

  // ===== HASH ROUTING =====
  function fromHash() {
    const h = (location.hash || '').replace('#','');
    const [m, d, mode] = h.split('|');
    const keys = Object.keys(MONTHS);
    curMonth = (m && MONTHS[m]) ? m : keys[keys.length - 1];
    const dashes = MONTHS[curMonth].dashboards;
    curDash = (d && dashes[d]) ? d : 'overview';
  }

  function toHash() {
    try { history.replaceState(null, '', '#' + curMonth + '|' + curDash); } catch(e) {}
  }

  // ===== TOAST & MODAL =====
  let toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1200);
  }

  function openModal(title, sub, html) {
    $('mTitle').textContent = title || 'Details';
    $('mSub').textContent = sub || '';
    $('mBody').innerHTML = html || '<p>No details.</p>';
    overlay.classList.add('show');
  }
  function closeModal() { overlay.classList.remove('show'); }
  mClose.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if(e.target === overlay) closeModal(); });
  window.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

  // ===== PRIVACY =====
  function priv(val, hasPrivacy) {
    return val;
  }

  // ===== CHART COLORS =====
  const CHART_COLORS = ['#3B82F6','#22C55E','#F59E0B','#A855F7','#06B6D4','#EF4444'];
  const CHART_BG = ['rgba(59,130,246,.25)','rgba(34,197,94,.25)','rgba(245,158,11,.25)','rgba(168,85,247,.25)','rgba(6,182,212,.25)','rgba(239,68,68,.25)'];

  function chartOpts(yLabel, type) {
    if (type === 'doughnut') {
      return {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { font: { family: "'DM Sans'", size: 11 }, color: '#63636E', padding: 12 }
          }
        }
      };
    }
    return {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { family: "'DM Sans'", size: 11 }, color: '#63636E' },
          border: { display: false }
        },
        y: {
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { font: { family: "'JetBrains Mono'", size: 11 }, color: '#3F3F46' },
          border: { display: false },
          title: yLabel ? { display: true, text: yLabel, font: { family: "'DM Sans'", size: 11 }, color: '#3F3F46' } : { display: false }
        }
      }
    };
  }

  // ===== RENDER CALENDAR =====
  function renderCalendar(container, sermonDates, readingDates) {
    // Dynamic: compute startDay and daysInMonth from curMonth
    const [yr, mo] = curMonth.split('-').map(Number);
    const firstDow = new Date(yr, mo - 1, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(yr, mo, 0).getDate();
    const startDay = firstDow;
    const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const sermons = sermonDates || [];
    const readings = readingDates || [];

    // Build sermon ID map from current month's sermons
    const sermonIdMap = {};
    const monthDb = MONTHS[curMonth];
    if (monthDb && monthDb.dashboards && monthDb.dashboards.spiritual && monthDb.dashboards.spiritual.sermons) {
      monthDb.dashboards.spiritual.sermons.forEach(s => {
        const dayMatch = s.date.match(/\d+(?=,)/);
        if (dayMatch) sermonIdMap[parseInt(dayMatch[0])] = s.id;
      });
    }

    let html = '<div class="cal-grid">';
    dows.forEach(d => html += `<div class="cal-dow">${d}</div>`);
    for (let i = 0; i < startDay; i++) html += '<div class="cal-day empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      let cls = 'cal-day';
      let dataAttr = '';
      if (sermons.includes(d)) {
