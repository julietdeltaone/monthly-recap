<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBC Sermon Series — Acts 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1410;--parchment:#f5f0e8;--cream:#faf7f2;--gold:#b8860b;--gold-light:#d4a830;--rust:#8b3a2a;--muted:#7a6e62;--border:#d9d0c0;--card-bg:#ffffff;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Source Serif 4',Georgia,serif;background:var(--parchment);color:var(--ink);min-height:100vh;}
  .site-header{background:var(--ink);color:var(--parchment);padding:2.5rem 2rem 2rem;text-align:center;position:relative;overflow:hidden;}
  .site-header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(184,134,11,.06) 60px,rgba(184,134,11,.06) 61px);}
  .header-eyebrow{font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold-light);margin-bottom:.75rem;position:relative;}
  .site-header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:700;line-height:1.1;position:relative;}
  .site-header h1 em{font-style:italic;color:var(--gold-light);}
  .header-sub{font-size:.95rem;color:rgba(245,240,232,.6);margin-top:.75rem;font-style:italic;position:relative;}
  .header-rule{width:60px;height:2px;background:var(--gold);margin:1.25rem auto 0;}
  /* PROGRESS BAR */
  .progress-bar-wrap{position:sticky;top:0;z-index:50;background:var(--ink);padding:.55rem 2rem .65rem;border-bottom:1px solid rgba(255,255,255,.06);}
  .progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;}
  .progress-label{font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,240,232,.4);transition:color .3s;}
  .progress-pct{font-size:.64rem;letter-spacing:.15em;color:var(--gold-light);font-weight:600;transition:all .4s;}
  .progress-track{height:4px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;position:relative;}
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--gold) 0%,var(--gold-light) 60%,#f0c84a 100%);
    border-radius:4px;
    transition:width .55s cubic-bezier(.4,0,.2,1);
    position:relative;
    box-shadow:0 0 8px rgba(184,134,11,.5);
  }
  .progress-fill::after{
    content:'';
    position:absolute;
    top:0;right:0;bottom:0;
    width:40px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
    animation:shimmer 1.8s ease-in-out infinite;
  }
  @keyframes shimmer{
    0%{transform:translateX(-40px);opacity:0;}
    40%{opacity:1;}
    100%{transform:translateX(40px);opacity:0;}
  }
  .progress-fill.just-changed{animation:pulse-glow .5s ease-out;}
  @keyframes pulse-glow{
    0%{box-shadow:0 0 0 rgba(184,134,11,0);}
    40%{box-shadow:0 0 16px rgba(212,168,48,.8);}
    100%{box-shadow:0 0 8px rgba(184,134,11,.5);}
  }
  /* SEARCH */
  .search-wrap{margin-bottom:1.5rem;position:relative;}
  .search-input{width:100%;background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:.6rem 2.5rem .6rem .9rem;font-family:'Source Serif 4',serif;font-size:.88rem;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;}
  .search-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,.08);}
  .search-input::placeholder{color:var(--muted);}
  .search-clear{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;display:none;line-height:1;transition:color .2s;}
  .search-clear:hover{color:var(--rust);}
  .search-results-count{font-size:.72rem;color:var(--muted);margin-top:.4rem;font-style:italic;min-height:1rem;transition:opacity .2s;}
  /* GLANCE VIEW */
  .view-toggle{display:flex;gap:.4rem;margin-bottom:1.5rem;}
  .view-btn{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:.4rem .85rem;font-size:.74rem;cursor:pointer;font-family:'Source Serif 4',serif;color:var(--muted);transition:all .2s;}
  .view-btn:hover{border-color:var(--gold);color:var(--gold);}
  .view-btn.active{background:var(--ink);border-color:var(--ink);color:var(--parchment);}
  .glance-view{display:none;}
  .glance-view.visible{display:block;}
  .detail-view.hidden{display:none;}
  .glance-grid{display:flex;flex-direction:column;gap:.6rem;}
  .glance-item{background:var(--card-bg);border:1px solid var(--border);border-radius:6px;padding:1.1rem 1.4rem;cursor:pointer;transition:all .2s;display:grid;grid-template-columns:auto 1fr auto;gap:1rem;align-items:center;}
  .glance-item:hover{border-color:var(--gold);background:var(--parchment);}
  .glance-item.active-glance{border-color:var(--gold);background:#fdf8ee;}
  .glance-num{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--border);line-height:1;}
  .glance-item.active-glance .glance-num{color:var(--gold);}
  .glance-date{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.2rem;}
  .glance-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:.3rem;}
  .glance-overview{font-size:.82rem;line-height:1.6;color:var(--muted);font-weight:300;}
  .glance-arrow{color:var(--border);font-size:1rem;transition:color .2s;}
  .glance-item:hover .glance-arrow{color:var(--gold);}
  /* READ TIME BADGE */
  .read-time{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:.5rem;display:flex;align-items:center;gap:.3rem;}
  .read-time::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--border);}
  .main-layout{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}
  .month-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
  .month-tab{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:.45rem 1.1rem;font-size:.78rem;cursor:pointer;font-family:'Source Serif 4',serif;color:var(--muted);transition:all .2s;letter-spacing:.08em;}
  .month-tab:hover{border-color:var(--gold);color:var(--gold);}
  .month-tab.active{background:var(--ink);border-color:var(--ink);color:var(--parchment);}
  .section-label{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .timeline-section{margin-bottom:2rem;}
  .timeline{display:flex;align-items:stretch;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .timeline-item{flex:1;padding:1rem .85rem;cursor:pointer;border-right:1px solid var(--border);transition:background .2s;}
  .timeline-item:last-child{border-right:none;}
  .timeline-item:hover{background:var(--parchment);}
  .timeline-item.active{background:var(--ink);}
  .timeline-item.active .tl-date{color:var(--gold-light);}
  .timeline-item.active .tl-title{color:var(--parchment);}
  .timeline-item.active .tl-book{color:rgba(245,240,232,.5);}
  .timeline-item.active .tl-dot{background:var(--gold-light);}
  .tl-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);margin-bottom:.5rem;}
  .tl-date{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem;}
  .tl-title{font-family:'Playfair Display',serif;font-size:.82rem;font-weight:700;line-height:1.3;color:var(--ink);margin-bottom:.25rem;}
  .tl-book{font-size:.63rem;color:var(--muted);font-style:italic;}
  .themes-section{margin-bottom:2rem;}
  .themes-grid{display:flex;flex-wrap:wrap;gap:.5rem;}
  .theme-tag{background:var(--card-bg);border:1px solid var(--border);border-radius:100px;padding:.32rem .85rem;font-size:.76rem;cursor:pointer;transition:all .2s;color:var(--muted);display:flex;align-items:center;gap:.4rem;}
  .theme-tag:hover{border-color:var(--gold);color:var(--gold);}
  .theme-tag.active{background:var(--gold);border-color:var(--gold);color:white;}
  .theme-tag .tag-count{background:rgba(0,0,0,.12);border-radius:100px;padding:0 .35rem;font-size:.64rem;font-weight:600;}
  .theme-tag.active .tag-count{background:rgba(255,255,255,.25);}
  .sermon-content{display:none;animation:fadeIn .3s ease;}
  .sermon-content.visible{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .sermon-card{background:var(--card-bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .sermon-header{padding:1.75rem 2rem 1.4rem;border-bottom:1px solid var(--border);}
  .sermon-date-badge{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;}
  .sermon-title{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,3vw,1.9rem);line-height:1.2;color:var(--ink);}
  .sermon-scripture-pills{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.9rem;}
  .scripture-pill{background:var(--parchment);border:1px solid var(--border);border-radius:4px;padding:.22rem .55rem;font-size:.7rem;color:var(--rust);cursor:pointer;transition:all .2s;font-style:italic;}
  .scripture-pill:hover{background:var(--rust);color:white;border-color:var(--rust);}
  .sermon-body{padding:1.75rem 2rem;display:grid;grid-template-columns:1fr 1fr;gap:2rem;}
  .content-block{margin-bottom:1.5rem;}
  .content-block-label{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem;}
  .content-block-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .overview-text{font-size:1rem;line-height:1.75;color:var(--ink);font-weight:300;}
  .key-point{margin-bottom:1.1rem;padding:1rem 1rem 1rem .9rem;border-left:3px solid var(--gold);background:var(--parchment);border-radius:0 4px 4px 0;}
  .key-point-title{font-family:'Playfair Display',serif;font-size:.93rem;font-weight:700;color:var(--ink);margin-bottom:.45rem;}
  .key-point-text{font-size:.87rem;line-height:1.7;color:#4a4035;font-weight:300;}
  .application-block{grid-column:1/-1;background:var(--ink);color:var(--parchment);border-radius:4px;padding:1.3rem 1.5rem;display:flex;gap:1rem;align-items:flex-start;}
  .app-icon{font-size:1.3rem;flex-shrink:0;margin-top:.1rem;}
  .app-label{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-light);margin-bottom:.4rem;}
  .app-text{font-size:.88rem;line-height:1.7;color:rgba(245,240,232,.85);font-weight:300;font-style:italic;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,20,16,.7);z-index:100;align-items:center;justify-content:center;padding:1rem;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:var(--cream);border:1px solid var(--border);border-radius:8px;max-width:520px;width:100%;padding:2rem;position:relative;max-height:80vh;overflow-y:auto;animation:modalIn .25s ease;}
  @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .modal-ref{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--rust);margin-bottom:.75rem;}
  .modal-text{font-family:'Playfair Display',serif;font-size:1.05rem;line-height:1.8;color:var(--ink);font-style:italic;}
  .modal-source{font-size:.75rem;color:var(--muted);margin-top:1rem;}
  .modal-close{position:absolute;top:1rem;right:1rem;background:none;border:1px solid var(--border);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:.85rem;color:var(--muted);display:flex;align-items:center;justify-content:center;}
  .modal-close:hover{background:var(--parchment);}
  .sermon-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;}
  .nav-btn{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:.5rem 1rem;font-size:.78rem;cursor:pointer;font-family:'Source Serif 4',serif;color:var(--muted);transition:all .2s;}
  .nav-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
  .nav-btn:disabled{opacity:.3;cursor:default;}
  .nav-counter{font-size:.75rem;color:var(--muted);font-style:italic;}
  @media(max-width:680px){.sermon-body{grid-template-columns:1fr;}.timeline{flex-direction:column;}.timeline-item{border-right:none;border-bottom:1px solid var(--border);}.timeline-item:last-child{border-bottom:none;}}
</style>
</head>
<body>
<header class="site-header">
  <p class="header-eyebrow">Calvary Baptist Church · 2026</p>
  <h1>Walking Through <em>Acts</em></h1>
  <p class="header-sub">A sermon series on the early church</p>
  <div class="header-rule"></div>
</header>
<div class="progress-bar-wrap">
  <div class="progress-meta">
    <span class="progress-label" id="progress-label">Sermon 1 of 10</span>
    <span class="progress-pct" id="progress-pct">10%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:10%"></div></div>
</div>
<main class="main-layout">
  <div class="view-toggle">
    <button class="view-btn active" onclick="setView('detail',this)">Sermon View</button>
    <button class="view-btn" onclick="setView('glance',this)">Series at a Glance</button>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="Search sermons by keyword, theme, or scripture..." oninput="handleSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">&#x2715;</button>
    <div class="search-results-count" id="search-count"></div>
  </div>
  <div class="glance-view" id="glance-view"><div class="glance-grid" id="glance-grid"></div></div>
  <div class="detail-view" id="detail-view">
  <div class="month-tabs">
    <div class="month-tab active" onclick="filterMonth('all',this)">All Sermons</div>
    <div class="month-tab" onclick="filterMonth('jan',this)">January</div>
    <div class="month-tab" onclick="filterMonth('feb',this)">February</div>
    <div class="month-tab" onclick="filterMonth('mar',this)">March</div>
  </div>
  <section class="timeline-section">
    <p class="section-label">Sermon Series Timeline</p>
    <div class="timeline" id="timeline"></div>
  </section>
  <section class="themes-section">
    <p class="section-label">Recurring Themes</p>
    <div class="themes-grid">
      <span class="theme-tag" onclick="filterTheme('holy-spirit',this)">Holy Spirit <span class="tag-count">8</span></span>
      <span class="theme-tag" onclick="filterTheme('surrender',this)">Surrender <span class="tag-count">7</span></span>
      <span class="theme-tag" onclick="filterTheme('persecution',this)">Persecution <span class="tag-count">4</span></span>
      <span class="theme-tag" onclick="filterTheme('salvation',this)">Salvation <span class="tag-count">8</span></span>
      <span class="theme-tag" onclick="filterTheme('boldness',this)">Boldness <span class="tag-count">4</span></span>
      <span class="theme-tag" onclick="filterTheme('heart',this)">Heart <span class="tag-count">5</span></span>
      <span class="theme-tag active" onclick="filterTheme(null,this)">All Sermons</span>
    </div>
  </section>
  <div id="sermon-cards"></div>
  <div class="sermon-nav">
    <button class="nav-btn" id="prev-btn" onclick="navSermon(-1)" disabled>← Previous</button>
    <span class="nav-counter" id="nav-counter"></span>
    <button class="nav-btn" id="next-btn" onclick="navSermon(1)">Next →</button>
  </div>
  </div><!-- end detail-view -->
</main>
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-ref" id="modal-ref"></div>
    <div class="modal-text" id="modal-text"></div>
    <div class="modal-source" id="modal-source"></div>
  </div>
</div>
<script>
const sermons=[
  {
    id:0,month:'jan',date:'January 4, 2026',title:'Waiting Is Not Passive',book:'Acts 1',
    themes:['holy-spirit','surrender'],
    scriptures:[{label:'Acts 1:4–8',key:'acts14'},{label:'Romans 8:26–27',key:'rom826'}],
    overview:'Acts 1 draws a line between genuine waiting on God and what most of us actually do. The disciples went to a place with no distractions, prayed together in one accord, and made specific petitions to the Lord until the promise came. That kind of waiting is active, hungry, and costly.',
    points:[
      {title:'1. Real Waiting Looks Nothing Like What We Do',text:'Most of us, when offended or in need, skip prayer and go straight to building a coalition. We want people on our side right now. We don\'t want to wait on God to soften hearts and fix the issue. The disciples in Acts 1 were in constant prayer and supplication, fasting, suffering together, and becoming the church in the process. That is the definition of waiting on the Lord.'},
      {title:'2. Forgiveness Is the Litmus Test',text:'The people who can hurt you most are usually the closest to you, and sometimes you genuinely do not have it in yourself to forgive them. That is exactly why you need the Holy Spirit. Forgiveness should be what the church is known for. Instead we are known for judgment. If you cannot forgive, that is not just a character flaw. According to Matthew 6, it is a spiritual problem that only the Spirit can fix.'}
    ],
    application:'Stop going to other people first. Go to God. Wait on him in prayer and supplication, not as a formality but as a genuine act of dependence. God is still moving even when you cannot feel it, taste it, or touch it. Just because you have not stepped into the promise does not mean his presence is not there.'
  },
  {
    id:1,month:'jan',date:'January 11, 2026',title:'The Day of Pentecost',book:'Acts 2',
    themes:['holy-spirit','salvation'],
    scriptures:[{label:'Acts 2:1–4',key:'acts21'},{label:'Galatians 5:22–23',key:'gal522'}],
    overview:'Acts 2 is the fulfillment of everything Acts 1 was building toward. The Holy Spirit came on all of them at once, not just the leaders, and the evidence was not emotional but transformational. The fruit of the Spirit is the proof, and that fruit is something your flesh is simply not capable of producing on its own.',
    points:[
      {title:'1. Everyone Who Waited Was Filled',text:'They were all in one accord in one place. Not just the apostles. Not just the spiritually impressive. Everyone who had gathered with one purpose was filled. Spirit-filling is not reserved for special Christians. It is available to every believer who yields and receives what God freely offers rather than trying to manufacture it through effort.'},
      {title:'2. The Cross Must Be Enough to Forgive Others Too',text:'God\'s purpose is not to keep us trapped in shame but to liberate us from sin\'s guilt entirely. When you refuse to forgive someone, you are functionally saying the cross was not sufficient. If the cross was enough to cover your sin before God, then it is enough to release what others have done to you. Anything less denies the power of what Christ actually accomplished.'}
    ],
    application:'Come to God with complete honesty about sin, not religious pretense. Drop the mask. The Spirit does the work. Your job is to stop trying to produce what only God can produce and start receiving what is already being freely offered.'
  },
  {
    id:2,month:'jan',date:'January 25, 2026',title:'Peter Before and After',book:'Acts 2 — Peter\'s Sermon',
    themes:['holy-spirit','salvation','surrender'],
    scriptures:[{label:'Acts 2:38–41',key:'acts238'},{label:'Luke 22:54–62',key:'luke2254'}],
    overview:'Peter\'s sermon in Acts 2 is the most successful in history, 3,000 souls in one day. But the same man who preached it boldly was the same man who denied Christ three times in a courtyard just weeks before. The only thing that changed between those two Peters was the Holy Spirit. That difference is everything.',
    points:[
      {title:'1. You Can Do Ministry Without Salvation',text:'Peter cast out demons and healed people before Pentecost. He followed Jesus for three years. When pressure came, he denied Christ three times. Spiritual activity is not proof of salvation. You can apply biblical principles, live a moral life, and do a lot of impressive religious things without ever genuinely submitting your will to the Holy Spirit. The principles of Christ work whether you believe or not. That is what makes it so easy to confuse behavior modification with transformation.'},
      {title:'2. The Roller Coaster Is a Sign, Not Just a Struggle',text:'The pattern of youth camp highs that last two weeks followed by doubt and rebellion is not just immaturity. It is what life looks like when the Holy Spirit has not genuinely taken residence. When everything is going well you feel close to God, when things fall apart you fall apart. That is not Spirit-filled Christianity. When the Holy Spirit is truly there, something sustains that has nothing to do with circumstances.'}
    ],
    application:'Ask yourself honestly where you are. If you have been on this roller coaster for years, that is not something to manage better. It is a signal. The chairman of a deacon board can walk the aisle and say this has been my whole life. It is never too late and no role is too impressive to need the real thing.'
  },
  {
    id:3,month:'feb',date:'February 1, 2026',title:'What I Do Have, I Give You',book:'Acts 3:1–26, 4:1–4',
    themes:['holy-spirit','surrender','boldness'],
    scriptures:[{label:'Acts 3:6',key:'acts36'},{label:'Acts 3:1–10',key:'acts31'},{label:'Acts 4:1–4',key:'acts41'}],
    overview:'Acts 3 puts three kinds of people in the same moment. Those who have been changed and must give what they have. Those who are broken and need to receive. And those in positions of authority who resist what the Spirit is doing. Every person in the room is one of those three.',
    points:[
      {title:'1. You Have More Than You Think',text:'Peter and John had no money. The religious culture said if you cannot give alms, stay home. But they were no longer operating by the world\'s economy. They had the name of Jesus and they gave that instead. Faith required action. It did not happen when Peter spoke the words. It happened when he took the man by the hand and pulled him up. Satan wants you fixated on what you do not have. If you have salvation and hope in Christ, you have everything that matters.'},
      {title:'2. Opposition Will Come from Inside the Church',text:'Peter and John were not arrested by pagans. They were arrested by the priests, the captain of the temple, the Sadducees. The religious establishment. When you start moving in the power of God it will disrupt systems and people who have a stake in those systems will not like it. That cost is expected. That cost is worth it. Do not let it surprise you and do not let it stop you.'}
    ],
    application:'Figure out which category you are in right now. If you have been changed, stop focusing on what you lack and start freely giving what you do have. If you are the beggar, reach up and take the hand being extended. If you are the one resisting what the Spirit is doing because it upsets your plan, repent and let him work.'
  },
  {
    id:4,month:'feb',date:'February 8, 2026',title:'Boldness in the Face of Opposition',book:'Acts 4:1–12',
    themes:['holy-spirit','persecution','boldness'],
    scriptures:[{label:'Acts 4:8–10',key:'acts48'},{label:'Acts 4:11–12',key:'acts411'},{label:'Psalm 118:22',key:'ps11822'}],

let currentId=0,visibleIds=sermons.map(s=>s.id);

function readTime(s){
  const words=(s.overview+' '+s.points.map(p=>p.title+' '+p.text).join(' ')+' '+s.application).split(/\s+/).length;
  return Math.max(2,Math.round(words/200))+' min read';
}

function buildGlance(){
  const g=document.getElementById('glance-grid');
  g.innerHTML='';
  sermons.forEach((s,i)=>{
    const div=document.createElement('div');
    div.className='glance-item'+(s.id===currentId?' active-glance':'');
    div.setAttribute('data-gid',s.id);
    div.onclick=()=>{
      document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
      document.querySelector('.view-btn').classList.add('active');
      document.getElementById('glance-view').classList.remove('visible');
      document.getElementById('detail-view').classList.remove('hidden');
      selectSermon(s.id);
    };
    div.innerHTML=`<div class="glance-num">${String(i+1).padStart(2,'0')}</div><div><div class="glance-date">${s.date}</div><div class="glance-title">${s.title}</div><div class="glance-overview">${s.overview}</div></div><div class="glance-arrow">&#8594;</div>`;
    g.appendChild(div);
  });
}

function updateProgress(){
  const allIds=sermons.map(s=>s.id);
  const pos=allIds.indexOf(currentId)+1;
  const total=allIds.length;
  const pct=Math.round((pos/total)*100);
  const fill=document.getElementById('progress-fill');
  fill.classList.remove('just-changed');
  void fill.offsetWidth; // force reflow to restart animation
  fill.style.width=pct+'%';
  fill.classList.add('just-changed');
  document.getElementById('progress-label').textContent='Sermon '+pos+' of '+total;
  document.getElementById('progress-pct').textContent=pct+'%';
}

function setView(view,el){
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(view==='glance'){
    document.getElementById('glance-view').classList.add('visible');
    document.getElementById('detail-view').classList.add('hidden');
  } else {
    document.getElementById('glance-view').classList.remove('visible');
    document.getElementById('detail-view').classList.remove('hidden');
  }
}

function handleSearch(val){
  const clear=document.getElementById('search-clear');
  const count=document.getElementById('search-count');
  val=val.trim().toLowerCase();
  clear.style.display=val?'block':'none';
  if(!val){
    visibleIds=sermons.map(s=>s.id);
    count.textContent='';
    buildTimeline();
    updateNav();
    return;
  }
  visibleIds=sermons.filter(s=>{
    const hay=(s.title+' '+s.overview+' '+s.points.map(p=>p.title+' '+p.text).join(' ')+' '+s.application+' '+s.scriptures.map(sc=>sc.label).join(' ')+' '+s.themes.join(' ')).toLowerCase();
    return hay.includes(val);
  }).map(s=>s.id);
  count.textContent=visibleIds.length===0?'No results found':visibleIds.length+' sermon'+(visibleIds.length===1?'':'s')+' match';
  sermons.forEach(s=>{
    const tl=document.querySelector('[data-id="'+s.id+'"]');
    if(tl)tl.style.opacity=visibleIds.includes(s.id)?'1':'0.3';
  });
  if(visibleIds.length>0&&!visibleIds.includes(currentId))selectSermon(visibleIds[0]);
  updateNav();
}

function clearSearch(){
  document.getElementById('search-input').value='';
  handleSearch('');
}

function buildTimeline(){
  const tl=document.getElementById('timeline');
  tl.innerHTML='';
  const vis=sermons.filter(s=>visibleIds.includes(s.id));
  vis.forEach(s=>{
    const d=document.createElement('div');
    d.className='timeline-item'+(s.id===currentId?' active':'');
    d.setAttribute('data-id',s.id);
    d.onclick=()=>selectSermon(s.id);
    const shortDate=s.date.replace(', 2026','');
    d.innerHTML=`<div class="tl-dot"></div><div class="tl-date">${shortDate}</div><div class="tl-title">${s.title}</div><div class="tl-book">${s.book}</div>`;
    tl.appendChild(d);
  });
}

function buildCards(){
  const c=document.getElementById('sermon-cards');
  c.innerHTML='';
  sermons.forEach(s=>{
    const pills=s.scriptures.map(sc=>`<span class="scripture-pill" onclick="openScripture('${sc.key}')">${sc.label}</span>`).join('');
    const pts=s.points.map(p=>`<div class="key-point"><div class="key-point-title">${p.title}</div><div class="key-point-text">${p.text}</div></div>`).join('');
    const div=document.createElement('div');
    div.id='sermon-'+s.id;
    div.className='sermon-content'+(s.id===currentId?' visible':'');
    div.innerHTML=`<div class="sermon-card"><div class="sermon-header"><div class="sermon-date-badge">${s.date}</div><div class="sermon-title">${s.title}</div><div class="read-time">${readTime(s)}</div><div class="sermon-scripture-pills">${pills}</div></div><div class="sermon-body"><div class="overview-col"><div class="content-block"><p class="content-block-label">Overview</p><p class="overview-text">${s.overview}</p></div></div><div class="points-col"><div class="content-block"><p class="content-block-label">Key Points</p>${pts}</div></div><div class="application-block"><div class="app-icon">&#10022;</div><div><div class="app-label">Application</div><p class="app-text">${s.application}</p></div></div></div></div>`;
    c.appendChild(div);
  });
}

function selectSermon(id){
  document.querySelectorAll('.sermon-content').forEach(el=>el.classList.remove('visible'));
  const el=document.getElementById('sermon-'+id);
  if(el)el.classList.add('visible');
  currentId=id;
  buildTimeline();
  buildGlance();
  updateNav();
  updateProgress();
}

function filterMonth(month,el){
  document.querySelectorAll('.month-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  visibleIds=month==='all'?sermons.map(s=>s.id):sermons.filter(s=>s.month===month).map(s=>s.id);
  selectSermon(visibleIds[0]);
  buildTimeline();
}

function filterTheme(theme,el){
  document.querySelectorAll('.theme-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  visibleIds=theme?sermons.filter(s=>s.themes.includes(theme)).map(s=>s.id):sermons.map(s=>s.id);
  sermons.forEach(s=>{
    const tl=document.querySelector('[data-id="'+s.id+'"]');
    if(tl)tl.style.opacity=visibleIds.includes(s.id)?'1':'0.35';
  });
  if(visibleIds.length>0)selectSermon(visibleIds[0]);
  updateNav();
}

function navSermon(dir){
  const idx=visibleIds.indexOf(currentId);
  const next=visibleIds[idx+dir];
  if(next!==undefined)selectSermon(next);
}

function updateNav(){
  const idx=visibleIds.indexOf(currentId);
  document.getElementById('prev-btn').disabled=idx===0;
  document.getElementById('next-btn').disabled=idx===visibleIds.length-1;
  document.getElementById('nav-counter').textContent=(idx+1)+' of '+visibleIds.length;
}

function openScripture(key){
  const s=scriptures[key];
  if(!s)return;
  document.getElementById('modal-ref').textContent=s.ref;
  document.getElementById('modal-text').textContent=s.text;
  document.getElementById('modal-source').textContent=s.source;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e){if(e.target===document.getElementById('modal'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal').classList.remove('open');}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModalDirect();
  if(e.key==='ArrowRight')navSermon(1);
  if(e.key==='ArrowLeft')navSermon(-1);
});

buildCards();
buildGlance();
// Check URL hash to auto-select month (e.g. #jan, #feb, #mar)
const hashMonth = window.location.hash.replace('#','').toLowerCase();
const monthMap = {jan:'jan',january:'jan',feb:'feb',february:'feb',mar:'mar',march:'mar'};
const startMonth = monthMap[hashMonth];
if(startMonth){
  // Filter to that month, activate correct tab
  visibleIds = sermons.filter(s=>s.month===startMonth).map(s=>s.id);
  if(visibleIds.length===0) visibleIds = sermons.map(s=>s.id);
  // Mark tab active
  document.querySelectorAll('.month-tab').forEach(t=>{
    if(t.textContent.toLowerCase().startsWith(startMonth.slice(0,3))) t.classList.add('active');
    else t.classList.remove('active');
  });
}
buildTimeline();
updateNav();
updateProgress();
// Select first visible sermon
if(visibleIds.length>0) selectSermon(visibleIds[0]);
</script>
</body>
</html>
