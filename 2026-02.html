<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD Monthly Recap</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0A0C10;
    --bg-card: #12151C;
    --bg-card-hover: #171B24;
    --border: rgba(255,255,255,.07);
    --border-hover: rgba(255,255,255,.13);
    --text: #E4E4E7;
    --text-soft: #A1A1AA;
    --text-muted: #63636E;
    --text-faint: #3F3F46;
    --accent: #3B82F6;
    --accent-bg: rgba(59,130,246,.08);
    --accent-glow: rgba(59,130,246,.25);
    --green: #22C55E;
    --green-bg: rgba(34,197,94,.08);
    --cyan: #06B6D4;
    --cyan-bg: rgba(6,182,212,.08);
    --red: #EF4444;
    --orange: #F59E0B;
    --purple: #A855F7;

    --sans: 'DM Sans', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- LAYOUT SHELL ---- */
  .shell {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  /* ---- HEADER ---- */
  .hdr {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .hdr-left { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  .hdr h1 {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    line-height: 1;
    color: var(--text);
  }
  .hdr .month-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .hdr-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* ---- TABS / PILLS ---- */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 20px 0 0;
    flex-wrap: wrap;
  }
  .tab {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 8px 14px;
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s ease;
  }
  .tab:hover { color: var(--text-soft); border-color: var(--border-hover); }
  .tab.on {
    color: var(--accent);
    border-color: rgba(59,130,246,.3);
    background: var(--accent-bg);
  }

  .pill {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s ease;
  }
  .pill:hover { border-color: var(--border-hover); color: var(--text-soft); }
  .pill.on {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }



  /* ---- GRID ---- */
  .dash {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
    margin-top: 24px;
    align-items: start;
  }
  @media (max-width: 860px) { .dash { grid-template-columns: 1fr; } }

  /* ---- SIDEBAR ---- */
  .side { display: flex; flex-direction: column; gap: 20px; }

  .stat-group { }
  .stat-group-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .stat-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-item:last-child { border-bottom: none; }
  .stat-k {
    font-size: 13px;
    color: var(--text-muted);
  }
  .stat-v {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .highlights-section { }
  .highlight-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    margin: 0 6px 6px 0;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    font-size: 12px;
    color: var(--text-soft);
    background: rgba(255,255,255,.03);
  }
  .highlight-chip .hdot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
  }

  .side-foot {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    display: flex;
    justify-content: space-between;
  }

  /* ---- MAIN CONTENT ---- */
  .content { min-width: 0; }

  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 860px) { .content-grid { grid-template-columns: 1fr; } }
  .span-full { grid-column: 1 / -1; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 20px;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .card:hover {
    border-color: var(--border-hover);
    box-shadow: 0 4px 24px rgba(0,0,0,.3);
  }

  .card-head {
    margin-bottom: 16px;
  }
  .card-title {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    line-height: 1.2;
    color: var(--text);
  }
  .card-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .chart-wrap {
    position: relative;
    width: 100%;
  }
  .chart-wrap canvas {
    width: 100% !important;
  }

  /* ---- NOTES LIST ---- */
  .note-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s;
  }
  .note-row:last-child { border-bottom: none; }
  .note-row:hover { background: var(--accent-bg); margin: 0 -12px; padding: 12px; border-radius: var(--r-sm); }
  .note-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .note-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    line-height: 1.4;
  }
  .note-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--accent);
    white-space: nowrap;
    padding-top: 2px;
  }

  /* ---- CALENDAR (spiritual) ---- */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    font-size: 12px;
  }
  .cal-dow {
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 6px 0;
  }
  .cal-day {
    text-align: center;
    padding: 6px 2px;
    border-radius: var(--r-sm);
    color: var(--text-muted);
    font-size: 11px;
    font-family: var(--mono);
  }
  .cal-day.hl-sermon {
    color: #fff;
    font-weight: 600;
    cursor: pointer;
  }
  .cal-day.hl-sermon .cal-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .cal-day.hl-sermon:hover .cal-num {
    transform: scale(1.15);
    box-shadow: 0 0 14px var(--accent-glow);
  }
  .cal-day.hl-reading {
    color: #fff;
    font-weight: 600;
  }
  .cal-day.hl-reading .cal-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px rgba(34,197,94,.3);
  }
  .cal-day.empty { visibility: hidden; }
  .cal-legend {
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .cal-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cal-legend .ldot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .cal-legend .ldot-sermon { background: var(--accent); }
  .cal-legend .ldot-reading { background: var(--green); }

  /* ---- MODAL ---- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border-hover);
    border-radius: var(--r-lg);
    width: min(640px, calc(100vw - 32px));
    max-height: 80vh;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,.5);
    animation: modalIn .18s ease-out;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-head h3 {
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .modal-head p { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .modal-close {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    background: none;
    cursor: pointer;
    color: var(--text-muted);
    transition: all .12s;
  }
  .modal-close:hover { border-color: var(--border-hover); color: var(--text); }
  .modal-body {
    padding: 20px;
    overflow-y: auto;
    max-height: calc(80vh - 80px);
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-soft);
  }
  .modal-body p { margin: 10px 0; }
  .modal-body ul { margin: 10px 0; padding-left: 20px; }
  .modal-body li { margin: 5px 0; }
  .modal-body b { color: var(--text); }

  /* ---- TOAST ---- */
  .toast-msg {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 16px;
    background: var(--accent);
    color: #fff;
    border-radius: var(--r-sm);
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s, transform .18s;
    z-index: 99999;
  }
  .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---- SELECTION LINE ---- */
  .sel-block {
    padding: 14px 16px;
    border-left: 2px solid var(--accent);
    background: var(--accent-bg);
    border-radius: 0 var(--r-sm) var(--r-sm) 0;
  }
  .sel-line {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .sel-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ---- MARK STUDY SIDEBAR ---- */
  .mark-study {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 20px;
    position: sticky;
    top: 16px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,.08) transparent;
  }
  .mark-study::-webkit-scrollbar { width: 4px; }
  .mark-study::-webkit-scrollbar-track { background: transparent; }
  .mark-study::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
  .mark-study-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .mark-study-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.3px;
  }
  .mark-study-body {
    margin-top: 16px;
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text-soft);
  }
  .mark-study-body p { margin: 8px 0; }
  .mark-study-body em { color: var(--text); font-style: italic; }
  .mark-study-body strong { color: var(--text); }
  .mark-section {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .mark-section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .mark-item {
    font-size: 12px;
    color: var(--text-soft);
    padding: 3px 0;
    line-height: 1.5;
  }
  .mark-ref {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    display: inline-block;
    min-width: 72px;
  }
  .mark-greek {
    font-style: italic;
    color: var(--cyan);
  }

  /* ---- FINANCIAL CATEGORY ACCORDION ---- */
  .fin-categories { display: flex; flex-direction: column; gap: 2px; }
  .fin-cat {
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    overflow: hidden;
    transition: border-color .15s;
  }
  .fin-cat:hover { border-color: var(--border-hover); }
  .fin-cat-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    background: rgba(255,255,255,.02);
    transition: background .12s;
    gap: 12px;
  }
  .fin-cat-head:hover { background: rgba(255,255,255,.04); }
  .fin-cat-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .fin-cat-arrow {
    font-size: 10px;
    color: var(--text-faint);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .fin-cat.open .fin-cat-arrow { transform: rotate(90deg); }
  .fin-cat-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .fin-cat-note {
    font-size: 11px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fin-cat-amt {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }
  .fin-cat-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin: 0 14px;
  }
  .fin-cat-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width .3s ease;
  }
  .fin-cat-body {
    display: none;
    padding: 0 14px 12px;
  }
  .fin-cat.open .fin-cat-body { display: block; }
  .fin-tx {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,.03);
  }
  .fin-tx:last-child { border-bottom: none; }
  .fin-tx-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    width: 44px;
    flex-shrink: 0;
  }
  .fin-tx-desc {
    color: var(--text-muted);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 8px;
  }
  .fin-tx-amt {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-soft);
    white-space: nowrap;
  }
  .fin-tx-label {
    font-size: 11px;
    color: var(--text-faint);
    font-style: italic;
    padding: 5px 0;
  }

  /* ---- SERMON TWO-COLUMN LAYOUT ---- */
  .sermon-block {
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background: var(--bg-card);
    overflow: hidden;
    transition: border-color .2s;
  }
  .sermon-block:hover { border-color: var(--border-hover); }
  .sermon-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sermon-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .sermon-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }
  .sermon-cols {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    min-height: 0;
    height: 520px;
  }
  @media (max-width: 860px) {
    .sermon-cols { grid-template-columns: 1fr; height: auto; }
  }
  .sermon-col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sermon-col-label {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 14px 20px 10px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sermon-col-scroll {
    padding: 16px 20px 20px;
    overflow-y: auto;
    overscroll-behavior: contain;
    flex: 1;
    min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,.1) transparent;
    /* prose styles for content */
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-soft);
  }
  .sermon-col-scroll::-webkit-scrollbar { width: 5px; }
  .sermon-col-scroll::-webkit-scrollbar-track { background: transparent; }
  .sermon-col-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }
  .sermon-col-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }
  .sermon-col + .sermon-col {
    border-left: 1px solid var(--border);
  }
  @media (max-width: 860px) {
    .sermon-col + .sermon-col { border-left: none; border-top: 1px solid var(--border); }
    .sermon-col-scroll { max-height: 400px; }
  }
  .sermon-col-label.lbl-notes { color: var(--accent); }
  .sermon-col-label.lbl-commentary { color: var(--green); }
  .sermon-prose {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-soft);
  }
  .sermon-prose p { margin: 0 0 12px; }
  .sermon-prose p:last-child { margin-bottom: 0; }
  .sermon-prose h4 {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin: 18px 0 6px;
    letter-spacing: 0.2px;
  }
  .sermon-prose h4:first-child { margin-top: 0; }
  .sermon-questions {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .sermon-questions-label {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 10px;
  }
  .sermon-questions ul {
    list-style: none;
    padding: 0;
  }
  .sermon-questions li {
    font-size: 12px;
    color: var(--text-soft);
    line-height: 1.6;
    padding: 5px 0 5px 16px;
    position: relative;
  }
  .sermon-questions li::before {
    content: '\203A';
    position: absolute;
    left: 0;
    color: var(--orange);
    font-weight: 600;
    font-size: 15px;
    line-height: 1.3;
  }
  .sermon-spacer { height: 16px; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up {
    animation: fadeUp .3s ease-out both;
  }
  .fade-up-1 { animation-delay: .05s; }
  .fade-up-2 { animation-delay: .1s; }
  .fade-up-3 { animation-delay: .15s; }
  .fade-up-4 { animation-delay: .2s; }

  /* ---- WORKOUT HEATMAP (physical sidebar) ---- */
  .heatmap-wrap { margin-top: 4px; }
  .heatmap-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .heatmap-grid {
    display: grid;
    grid-template-columns: 28px repeat(7,1fr);
    gap: 3px;
    font-size: 10px;
  }
  .hm-dow {
    text-align: center;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    padding-bottom: 3px;
  }
  .hm-week-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 4px;
  }
  .hm-cell {
    aspect-ratio: 1;
    border-radius: 3px;
    background: var(--border);
    position: relative;
    cursor: default;
  }
  .hm-cell.rest { background: rgba(255,255,255,.04); }
  .hm-cell[data-groups] { cursor: pointer; }
  .hm-cell:hover .hm-tooltip { display: block; }
  .hm-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #1e2433;
    border: 1px solid var(--border-hover);
    border-radius: var(--r-sm);
    padding: 6px 8px;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
    font-family: var(--mono);
  }
  .hm-legend {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .hm-legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--text-muted);
  }
  .hm-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ---- INTELLECTUAL LAYOUT ---- */
  .intel-wrap { display: flex; flex-direction: column; gap: 16px; }
  .intel-header {
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(59,130,246,.08), rgba(168,85,247,.06));
    border: 1px solid rgba(59,130,246,.2);
    border-radius: var(--r-lg);
  }
  .intel-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .intel-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }
  .intel-tagline {
    font-size: 13px;
    color: var(--text-soft);
    margin-top: 10px;
    line-height: 1.55;
  }
  .intel-pillars {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .intel-pillar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px;
    transition: border-color .15s;
  }
  .intel-pillar:hover { border-color: var(--border-hover); }
  .intel-pillar-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .intel-pillar-label.lbl-foundation { color: var(--accent); }
  .intel-pillar-label.lbl-engine     { color: var(--green); }
  .intel-pillar-label.lbl-control    { color: var(--orange); }
  .intel-pillar-label.lbl-resilience { color: var(--purple); }
  .intel-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
    gap: 8px;
  }
  .intel-row:last-child { border-bottom: none; }
  .intel-row-k {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .intel-row-v {
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    line-height: 1.4;
  }
  .intel-risks {
    background: var(--bg-card);
    border: 1px solid rgba(239,68,68,.2);
    border-radius: var(--r-md);
    padding: 14px;
  }
  .intel-risks-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 10px;
  }
  .intel-risk-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
    color: var(--text-muted);
  }
  .intel-risk-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    margin-top: 3px;
  }
  .intel-stable {
    background: var(--bg-card);
    border: 1px solid rgba(34,197,94,.2);
    border-radius: var(--r-md);
    padding: 14px;
  }
  .intel-stable-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 10px;
  }
  .intel-stable-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
    color: var(--text-muted);
  }
  .intel-stable-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    margin-top: 3px;
  }
  .intel-core-rule {
    padding: 14px 16px;
    border-left: 3px solid var(--accent);
    background: var(--accent-bg);
    border-radius: 0 var(--r-md) var(--r-md) 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
  }
  .intel-core-rule span {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent);
    display: block;
    margin-bottom: 5px;
  }
  .intel-verdict {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px;
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text-soft);
  }
  .intel-verdict-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 8px;
  }


  /* ---- CREATIVE / PHOTOGRAPHY ---- */
  .creative-wrap { display: flex; flex-direction: column; gap: 20px; }
  .creative-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
  }
  .creative-meta { flex: 1; }
  .creative-project-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .creative-project-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }
  .creative-desc {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text-soft);
  }
  .creative-stats-row {
    display: flex;
    gap: 20px;
    margin-top: 14px;
  }
  .creative-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .creative-stat-v {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    font-family: var(--mono);
  }
  .creative-stat-k {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .creative-gallery-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .creative-grid-7 {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .creative-grid-6 {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }
  .headshot-card {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .headshot-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    object-position: top center;
    border-radius: var(--r-md);
    border: 1px solid var(--border);
    display: block;
  }
  .headshot-name {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .creative-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0;
  }


  /* ---- OVERVIEW LANDING PAGE ---- */
  .ov-wrap { display: flex; flex-direction: column; gap: 16px; }

  /* Month banner */
  .ov-banner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px;
    background: linear-gradient(135deg, rgba(59,130,246,.10) 0%, rgba(168,85,247,.07) 100%);
    border: 1px solid rgba(59,130,246,.22);
    border-radius: var(--r-lg);
    gap: 20px;
  }
  .ov-banner-left { flex: 1; }
  .ov-banner-month {
    font-size: 26px; font-weight: 800; color: var(--text);
    letter-spacing: -0.5px; line-height: 1.1;
  }
  .ov-banner-sub {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-muted); margin-top: 4px; letter-spacing: 0.3px;
  }
  .ov-kpi-row {
    display: flex; gap: 24px; flex-shrink: 0;
  }
  .ov-kpi {
    display: flex; flex-direction: column; align-items: flex-end; gap: 1px;
  }
  .ov-kpi-v {
    font-size: 20px; font-weight: 700; font-family: var(--mono);
    color: var(--text);
  }
  .ov-kpi-v.green { color: var(--green); }
  .ov-kpi-v.red   { color: var(--red); }
  .ov-kpi-k { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* Two-col layout for main body */
  .ov-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ov-col  { display: flex; flex-direction: column; gap: 12px; }

  /* Section cards */
  .ov-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px 16px;
    transition: border-color .15s;
  }
  .ov-section:hover { border-color: var(--border-hover); }
  .ov-section-label {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 1.1px; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .ov-section-label.lbl-health    { color: #34d399; }
  .ov-section-label.lbl-finance   { color: var(--accent); }
  .ov-section-label.lbl-physical  { color: #f59e0b; }
  .ov-section-label.lbl-admin     { color: #a78bfa; }
  .ov-section-label.lbl-creative  { color: #f472b6; }
  .ov-section-label.lbl-spiritual { color: #fb923c; }
  .ov-section-label.lbl-intel     { color: #60a5fa; }

  .ov-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.04); gap: 8px;
  }
  .ov-row:last-child { border-bottom: none; }
  .ov-row-k { font-size: 12px; color: var(--text-soft); }
  .ov-row-v { font-size: 12px; font-weight: 600; color: var(--text); text-align: right; }
  .ov-row-v.ok   { color: var(--green); }
  .ov-row-v.warn { color: var(--orange); }
  .ov-row-v.bad  { color: var(--red); }
  .ov-row-v.dim  { color: var(--text-muted); font-weight: 400; }

  /* Admin / events list */
  .ov-event {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.04);
    font-size: 12px;
  }
  .ov-event:last-child { border-bottom: none; }
  .ov-event-date {
    font-family: var(--mono); font-size: 10px; color: var(--text-faint);
    white-space: nowrap; flex-shrink: 0; width: 58px; padding-top: 2px;
  }
  .ov-event-desc { color: var(--text-soft); line-height: 1.4; }
  .ov-event-desc b { color: var(--text); font-weight: 600; }
  .ov-event-tag {
    font-family: var(--mono); font-size: 9px; padding: 2px 5px;
    border-radius: 3px; flex-shrink: 0; margin-left: auto;
    font-weight: 500; letter-spacing: 0.5px;
  }
  .tag-done    { background: rgba(34,197,94,.15);  color: var(--green); }
  .tag-cancel  { background: rgba(239,68,68,.12);  color: var(--red); }
  .tag-miss    { background: rgba(251,146,60,.12); color: var(--orange); }
  .tag-follow  { background: rgba(99,102,241,.15); color: #818cf8; }

  /* Vitals strip */
  .ov-vitals {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-top: 4px;
  }
  .ov-vital {
    background: rgba(255,255,255,.03);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 8px 10px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .ov-vital-v { font-size: 14px; font-weight: 700; color: var(--text); font-family: var(--mono); }
  .ov-vital-k { font-size: 10px; color: var(--text-muted); }
  .ov-vital-flag { font-size: 9px; color: var(--orange); margin-top: 1px; }

  /* Full-width bottom section */
  .ov-full { grid-column: span 2; }


  /* ════════════════════════════════════════
     MOBILE RESPONSIVE — 480px / 640px / 860px
     ════════════════════════════════════════ */

  /* Fluid shell padding */
  @media (max-width: 640px) {
    .shell { padding: 16px 14px; }
    .hdr { padding-bottom: 16px; gap: 10px; }
    .hdr h1 { font-size: 18px; }
    .hdr-right { gap: 6px; }
    .pill { padding: 6px 10px; font-size: 10px; }
    .tabs { gap: 3px; padding-top: 14px; }
    .tab  { padding: 7px 10px; font-size: 10px; }
  }

  /* Dash: stack sidebar above main on mobile */
  @media (max-width: 860px) {
    .dash {
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    /* On mobile sidebar comes AFTER main content */
    .side  { order: 2; }
    .content { order: 1; }
  }

  /* Cards */
  @media (max-width: 640px) {
    .card { padding: 14px; border-radius: var(--r-md); }
    .card-head { margin-bottom: 12px; }
    .content-grid { gap: 12px; }
  }

  /* Overview banner */
  @media (max-width: 640px) {
    .ov-banner { flex-direction: column; gap: 14px; padding: 14px 16px; }
    .ov-kpi-row { justify-content: space-between; width: 100%; }
    .ov-kpi { align-items: flex-start; }
    .ov-kpi-v { font-size: 16px; }
    .ov-cols { grid-template-columns: 1fr; }
    .ov-full { grid-column: span 1; }
    .ov-vitals { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 641px) and (max-width: 860px) {
    .ov-cols { grid-template-columns: 1fr 1fr; }
    .ov-vitals { grid-template-columns: repeat(4, 1fr); }
  }

  /* Financial accordion */
  @media (max-width: 860px) {
    .fin-tx { flex-wrap: wrap; gap: 2px; }
    .fin-tx-date { width: 36px; font-size: 10px; }
    .fin-tx-desc { min-width: 0; font-size: 11px; white-space: normal; word-break: break-word; padding: 0 4px; }
    .fin-tx-amt  { font-size: 11px; margin-left: auto; }
    .fin-cat-head { padding: 10px 12px; }
    .fin-cat-name { font-size: 12px; }
    .fin-cat-amt  { font-size: 12px; min-width: 52px; }
    .fin-cat-note { font-size: 10px; }
  }
  @media (max-width: 640px) {
    .fin-layout { grid-template-columns: 1fr !important; }
    .fin-main { min-width: 0; }
    .fin-cat-body { padding: 6px 10px; }
    .fin-tx-label { font-size: 10px; }
  }

  /* Physical: heatmap cells readable on small screens */
  @media (max-width: 480px) {
    .heatmap-grid { gap: 2px; }
    .hm-week-label { width: 20px; font-size: 8px; }
    .hm-dow { font-size: 8px; }
    .hm-legend { gap: 6px; }
    .hm-legend-item { font-size: 9px; }
  }

  /* Intellectual pillars: 4-col → 2-col → 1-col on small */
  @media (max-width: 480px) {
    .intel-pillars { grid-template-columns: 1fr; }
  }
  @media (min-width: 481px) and (max-width: 860px) {
    .intel-pillars { grid-template-columns: 1fr 1fr; }
  }

  /* Creative headshot grids: shrink gracefully */
  @media (max-width: 640px) {
    .creative-grid-7 { grid-template-columns: repeat(4, 1fr); }
    .creative-grid-6 { grid-template-columns: repeat(3, 1fr); }
    .creative-stats-row { flex-wrap: wrap; gap: 12px; }
  }
  @media (max-width: 400px) {
    .creative-grid-7 { grid-template-columns: repeat(3, 1fr); }
    .creative-grid-6 { grid-template-columns: repeat(3, 1fr); }
  }

  /* Sermon modal */
  @media (max-width: 640px) {
    .modal-inner {
      padding: 20px 16px;
      max-height: 90vh;
      border-radius: var(--r-md) var(--r-md) 0 0;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      top: auto;
      transform: none !important;
      width: 100%;
      max-width: 100%;
    }
  }

  /* Stat items on sidebar */
  @media (max-width: 640px) {
    .stat-item { padding: 7px 0; }
    .stat-v { font-size: 12px; }
    .stat-k { font-size: 11px; }
  }

  /* Charts: don't let them go too tall on mobile */
  @media (max-width: 640px) {
    canvas { max-height: 220px !important; }
    .span-full { grid-column: span 1; }
  }

  /* Highlight chips wrap nicely */
  @media (max-width: 640px) {
    .highlights-section { display: flex; flex-wrap: wrap; gap: 6px; }
    .highlight-chip { font-size: 11px; }
  }


  /* ---- INTEL DOC LINK ---- */
  .intel-doc-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(59,130,246,.12), rgba(99,102,241,.08));
    border: 1px solid rgba(59,130,246,.35);
    border-radius: var(--r-lg);
    text-decoration: none;
    transition: all .2s ease;
    margin-bottom: 4px;
  }
  .intel-doc-link:hover {
    background: linear-gradient(135deg, rgba(59,130,246,.20), rgba(99,102,241,.14));
    border-color: rgba(59,130,246,.6);
    transform: translateY(-1px);
  }
  .intel-doc-icon {
    font-size: 28px;
    flex-shrink: 0;
    line-height: 1;
  }
  .intel-doc-text { flex: 1; min-width: 0; }
  .intel-doc-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
  }
  .intel-doc-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }
  .intel-doc-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 4px 8px;
    background: rgba(59,130,246,.2);
    border: 1px solid rgba(59,130,246,.35);
    border-radius: var(--r-sm);
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }


  /* ---- CREATIVE MISSED SECTION ---- */
  .creative-missed {
    margin-top: 16px;
    padding: 14px 18px;
    background: rgba(251,146,60,.06);
    border: 1px solid rgba(251,146,60,.22);
    border-radius: var(--r-md);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .creative-missed-icon {
    font-size: 22px;
    flex-shrink: 0;
    line-height: 1;
    margin-top: 1px;
  }
  .creative-missed-body { flex: 1; }
  .creative-missed-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--orange);
    margin-bottom: 3px;
  }
  .creative-missed-detail {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .creative-missed-tag {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    padding: 3px 7px;
    background: rgba(251,146,60,.15);
    border: 1px solid rgba(251,146,60,.3);
    border-radius: 3px;
    color: var(--orange);
    flex-shrink: 0;
    align-self: center;
    letter-spacing: 0.5px;
  }

</style>

            {
              id:"sermon-feb1",
              date:"February 1, 2026",
              title:"Acts 3 \u2014 What I Do Have, I Give You",
              substance:"<p>Brad opened by identifying three categories of people in Acts 3\u20134:4: those who have been changed and must freely give (Peter and John), those who are broken and need to receive (the beggar), and those in positions of religious authority who resist what the Spirit is doing (priests and Sadducees).</p><h4>Peter and John \u2014 Give What You Have (Acts 3:1\u201310)</h4><p>Peter and John arrived at the temple with no money. The religious leaders would have said to stay home. But they were no longer operating in the world\u2019s economy. Peter declared: \u201cSilver and gold have I none, but what I do have I give you.\u201d The healing happened not when Peter spoke but when he reached out and pulled the man up. Faith requires action behind the words.</p><p>After the healing and sermon, Peter and John were arrested \u2014 by church folks. Operating in God\u2019s power will cost relationships. That cost is expected and worth it.</p><h4>The Beggar \u2014 Receive What God Is Actually Offering (Acts 3:2\u20138)</h4><p>The man had been lame from birth. He kept showing up, kept positioning himself where help was possible. He came expecting money. God gave him something far greater. Once healed he did not hide it \u2014 he was leaping, loud, disruptive in the temple. 5,000+ people saw it. That is exactly what believers are supposed to do with what God does in their lives.</p><h4>The Religious Leaders \u2014 Don\u2019t Resist the Holy Spirit (Acts 4:1\u20134)</h4><p>The priests, captain of the temple, and Sadducees were greatly disturbed. The Holy Spirit is notorious for disrupting the way things are done. Brad shared a personal story from working at a large church \u2014 he loved his Monday task list, but God often had different plans. His ways are not our ways.</p><h4>Church Life Context</h4><p>Brad shared updates on two midweek gatherings: Celebrate Recovery (Tuesdays) \u2014 a 14\u201315 week series on how God redeems ongoing struggles rather than always removing them. Conversations of Faith (Thursdays) \u2014 covering difficult topics including accountability and judgment.</p>",
              commentary:"<p>The three-category framework forces honest self-placement. Am I freely giving what I have, or am I fixating on what I lack? The healing required Peter to physically act \u2014 he couldn\u2019t just speak. That principle extends: faith that doesn\u2019t move beyond words is incomplete.</p><p>The beggar\u2019s persistence matters too. He didn\u2019t know what God would actually give him, but he kept showing up where he could receive. That\u2019s a posture worth modeling. The disruption theme is honest: Spirit-led movement is messy, and the resistance often comes from inside the institution, not outside it.</p>",
              questions:[
                "Am I fixating on what I lack rather than freely giving what I do have?",
                "What does \u2018reaching out your hand\u2019 look like in a situation where I\u2019ve only been speaking faith?",
                "Where might I be the religious leader \u2014 resisting disruption because it threatens my plans?"
              ]
            },
            {
              id:"sermon-feb8",
              date:"February 8, 2026",
              title:"Acts 4 \u2014 Boldness in the Face of Opposition",
              substance:"<p>Brad traced the escalating opposition Peter faces: from a receptive crowd at Pentecost, to a mixed crowd at the temple, to openly hostile religious authorities in Acts 4. The pattern is consistent: obedience to God does not guarantee comfort, the audience gets harder, and the Holy Spirit is the only sustainable source of boldness.</p><h4>Doing the Right Thing Can Still Get You Punished (Acts 4:1\u20134)</h4><p>Peter and John did exactly what God called them to do. They were arrested and jailed overnight. The religious leaders were not angry about the miracle itself \u2014 they were angry because it confirmed Jesus as Messiah, which meant they had made a catastrophic mistake. Despite the opposition, approximately 5,000 people believed that day.</p><h4>The Shot Callers Gather (Acts 4:5\u20137)</h4><p>Annas, Caiaphas, John, Alexander, and the high priest\u2019s family assembled. This was not a sincere inquiry \u2014 they\u2019d already asked the same question. Now it was on official record with only leadership present, no supportive crowd. Brad\u2019s note: the audience for the gospel gets progressively harder.</p><h4>Filled with the Holy Spirit (Acts 4:8\u201310)</h4><p>\u201cThen Peter, filled with the Holy Spirit, said to them...\u201d This is the turning point. Peter preaches the same uncompromising message to the hardest audience yet. Boldness is not a personality trait \u2014 it is a product of Spirit-filling. The Holy Spirit is how you get off the roller coaster of feelings and circumstances.</p><h4>The Stone the Builders Rejected (Acts 4:11\u201312)</h4><p>Peter quotes Psalm 118:22 and delivers one of the most definitive statements in Scripture: \u201cNor is there salvation in any other, for there is no other name under heaven given among men by which we must be saved.\u201d No apology. No softening for a tougher audience.</p>",
              commentary:"<p>The escalation structure is sobering. The expectation in American Christianity is often that faithfulness produces smoother circumstances. The pattern here is the opposite. Each step of obedience leads to harder opposition. The honest question is whether I\u2019m building my faith on favorable outcomes or on the Spirit\u2019s sufficiency regardless of outcomes.</p><p>The \u201cshot callers\u201d detail is interesting: official inquiry without genuine openness, motivated by protecting position rather than finding truth. That\u2019s a posture that can exist in religious and professional settings alike. Worth examining whether I sometimes ask questions not to discover but to defend what I already decided.</p>",
              questions:[
                "Is my faith built to survive escalating difficulty, or does it require favorable conditions?",
                "Where do I soften the message for a harder audience rather than letting the Spirit sustain boldness?",
                "Am I asking questions to genuinely inquire, or to protect a position I\u2019ve already committed to?"
              ]
            },
            {
              id:"sermon-feb15",
              date:"February 15, 2026",
              title:"Acts 4\u20135 \u2014 Surrendered Hearts, Dangerous Hearts",
              substance:"<p>Brad continued the Acts series with the contrast between Barnabas and Ananias/Sapphira. The through-line: God judges the heart behind the action, not the action itself. The American church is in a dangerous place.</p><h4>The Early Church \u2014 All Things in Common (Acts 4:32\u201337)</h4><p>First-century believers shared possessions and sold excess for distribution to those in need. This ran against American instincts about saving and investing, but Brad\u2019s point: with God, \u201ceverything is opposite day.\u201d The trust enabling this was built on proximity \u2014 they did life together constantly. Many new believers were also losing everything due to family excommunication, making communal support necessary.</p><h4>Barnabas \u2014 The Surrendered Heart (Acts 4:36\u201337)</h4><p>Barnabas sold his land and laid all the money at the apostles\u2019 feet. His giving was pure worship. His land was no longer his security \u2014 his future was set in God alone. Brad connects this to Feb 1: Peter said he had no silver or gold. Barnabas had silver and gold, and gave that too. Same principle, next level.</p><h4>Ananias and Sapphira \u2014 The Deceptive Heart (Acts 5:1\u201311)</h4><p>They sold a possession, kept part, and presented the rest as the full amount. The sin was not the amount \u2014 the land and money were theirs to keep. The sin was deception: claiming full surrender while secretly holding back. Their real desire was status \u2014 to be perceived as holy without actually being holy. Peter confronted Ananias: \u201cWhy has Satan filled your heart to lie to the Holy Spirit?\u201d Both fell dead. Great fear came upon the church.</p><h4>Tithes, Offerings, and the New Covenant (Malachi 3; Leviticus 1\u20136)</h4><p>Brad drew a distinction between tithes (mandatory atonement sacrifices, fulfilled permanently by Christ) and offerings (voluntary, described by God as a \u201csweet aroma\u201d). New Testament giving is not about atoning for sin. It is a cheerful, surrendered response to what Christ has already done. No mandated monetary value in the New Testament.</p><h4>Jesus on Intent (Matthew 11:20\u201312:37)</h4><p>Jesus rebuked cities that witnessed His works and did not repent. He said it would be more tolerable for Sodom on judgment day than for Capernaum. Seeing God\u2019s power and refusing genuine response is the most dangerous position. Then immediately: \u201cCome to me, all who labor and are heavy laden, and I will give you rest.\u201d Barnabas had found this rest. Ananias and Sapphira refused it.</p>",
              commentary:"<p>The Barnabas/Ananias contrast is less about the money than about what the money revealed. Both made the same external action. The difference was entirely internal. That\u2019s the uncomfortable implication: external religious compliance can be completely disconnected from what\u2019s actually happening in the heart.</p><p>Brad\u2019s challenge to locate yourself honestly among the categories is harder than it sounds. The most dangerous version is probably the Ananias/Sapphira category \u2014 not because you\u2019re outwardly rebellious, but because you\u2019ve convinced yourself you\u2019re fully surrendered when you\u2019re not. The question isn\u2019t whether your giving looks like Barnabas but whether your heart is where his was.</p>",
              questions:[
                "Is there anything I\u2019m presenting as full surrender while secretly holding back?",
                "Do I give because I\u2019ve genuinely found rest in Christ, or to be perceived as someone who has?",
                "What would it actually look like for my security to be entirely in God rather than in what I\u2019ve accumulated?"
              ]
            }

            {title:"February Series Summary",sub:"Acts 3\u20135: Authority, boldness, and the heart behind the action",tag:"Tap",body:"<p>Brad\u2019s Acts series in February built a coherent through-line across three Sundays:</p><p><b>Feb 1</b> established the three-category framework: givers (Peter/John), receivers (the beggar), and resisters (religious leaders). The pattern of Spirit-empowered giving without concern for personal resources.</p><p><b>Feb 8</b> escalated the cost: faithful obedience produces harder opposition, not smoother circumstances. The Holy Spirit is the only sustainable source of boldness when the audience turns hostile.</p><p><b>Feb 15</b> pushed to the heart: Barnabas and Ananias/Sapphira made the same external action. The difference was entirely internal. God judges the heart behind the act, not the act itself. The dangerous version is not outright rebellion but performing surrender without actually surrendering.</p>"}

  let curMonth = null, curDash = null;
  let c1 = null, c2 = null;

  // ===== DOM =====
  const $ = id => document.getElementById(id);
  const monthLabel = $('monthLabel');
  const monthBtns = $('monthBtns');
  const dashTabs = $('dashTabs');
  const sidebar = $('sidebar');
  const mainContent = $('mainContent');
  const overlay = $('overlay');
  const mClose = $('mClose');
  const toastEl = $('toast');

  // ===== HASH ROUTING =====
  function fromHash() {
    const h = (location.hash || '').replace('#','');
    const [m, d, mode] = h.split('|');
    const keys = Object.keys(MONTHS);
    curMonth = (m && MONTHS[m]) ? m : keys[keys.length - 1];
    const dashes = MONTHS[curMonth].dashboards;
    curDash = (d && dashes[d]) ? d : 'overview';
  }

  function toHash() {
    try { history.replaceState(null, '', '#' + curMonth + '|' + curDash); } catch(e) {}
  }

  // ===== TOAST & MODAL =====
  let toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1200);
  }

  function openModal(title, sub, html) {
    $('mTitle').textContent = title || 'Details';
    $('mSub').textContent = sub || '';
    $('mBody').innerHTML = html || '<p>No details.</p>';
    overlay.classList.add('show');
  }
  function closeModal() { overlay.classList.remove('show'); }
  mClose.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if(e.target === overlay) closeModal(); });
  window.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

  // ===== PRIVACY =====
  function priv(val, hasPrivacy) {
    return val;
  }

  // ===== CHART COLORS =====
  const CHART_COLORS = ['#3B82F6','#22C55E','#F59E0B','#A855F7','#06B6D4','#EF4444'];
  const CHART_BG = ['rgba(59,130,246,.25)','rgba(34,197,94,.25)','rgba(245,158,11,.25)','rgba(168,85,247,.25)','rgba(6,182,212,.25)','rgba(239,68,68,.25)'];

  function chartOpts(yLabel, type) {
    if (type === 'doughnut') {
      return {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { font: { family: "'DM Sans'", size: 11 }, color: '#63636E', padding: 12 }
          }
        }
      };
    }
    return {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { family: "'DM Sans'", size: 11 }, color: '#63636E' },
          border: { display: false }
        },
        y: {
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { font: { family: "'JetBrains Mono'", size: 11 }, color: '#3F3F46' },
          border: { display: false },
          title: yLabel ? { display: true, text: yLabel, font: { family: "'DM Sans'", size: 11 }, color: '#3F3F46' } : { display: false }
        }
      }
    };
  }

  // ===== RENDER CALENDAR =====
  function renderCalendar(container, sermonDates, readingDates) {
    // Dynamic: compute startDay and daysInMonth from curMonth
    const [yr, mo] = curMonth.split('-').map(Number);
    const firstDow = new Date(yr, mo - 1, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(yr, mo, 0).getDate();
    const startDay = firstDow;
    const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const sermons = sermonDates || [];
    const readings = readingDates || [];

    // Build sermon ID map from current month's sermons
    const sermonIdMap = {};
    const monthDb = MONTHS[curMonth];
    if (monthDb && monthDb.dashboards && monthDb.dashboards.spiritual && monthDb.dashboards.spiritual.sermons) {
      monthDb.dashboards.spiritual.sermons.forEach(s => {
        const dayMatch = s.date.match(/\d+(?=,)/);
        if (dayMatch) sermonIdMap[parseInt(dayMatch[0])] = s.id;
      });
    }

    let html = '<div class="cal-grid">';
    dows.forEach(d => html += `<div class="cal-dow">${d}</div>`);
    for (let i = 0; i < startDay; i++) html += '<div class="cal-day empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      let cls = 'cal-day';
      let dataAttr = '';
      if (sermons.includes(d)) {
        cls += ' hl-sermon';
        if (sermonIdMap[d]) dataAttr = ` data-scroll-to="${sermonIdMap[d]}"`;
      }
      else if (readings.includes(d)) cls += ' hl-reading';
      html += `<div class="${cls}"${dataAttr}><span class="cal-num">${d}</span></div>`;
    }
    html += '</div>';
    html += '<div class="cal-legend">';
    html += '<span class="cal-legend-item"><span class="ldot ldot-sermon"></span> Sermon <span style="color:var(--text-faint);font-style:italic;margin-left:2px">(click to jump)</span></span>';
    html += '<span class="cal-legend-item"><span class="ldot ldot-reading"></span> Reading Mark</span>';
    html += '</div>';
    container.innerHTML = html;

    // Attach click listeners to sermon dates
    container.querySelectorAll('.hl-sermon[data-scroll-to]').forEach(el => {
      el.addEventListener('click', () => {
        const targetId = el.dataset.scrollTo;
        const target = document.getElementById(targetId);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          // Brief highlight flash
          target.style.transition = 'background .2s, border-color .2s';
          target.style.background = 'var(--accent-bg)';
          target.style.borderColor = 'rgba(59,130,246,.4)';
          setTimeout(() => {
            target.style.background = '';
            target.style.borderColor = '';
          }, 1500);
        }
      });
    });
  }

        <div style="display:grid;grid-template-columns:180px 80px 70px 70px 80px;gap:0;font-family:var(--mono);font-size:10px;">
          <div style="padding:5px 0;color:var(--text-faint);border-bottom:1px solid var(--border);">Lift</div>
          <div style="padding:5px 0;color:var(--text-faint);border-bottom:1px solid var(--border);">Goal</div>
          <div style="padding:5px 0;color:var(--text-faint);border-bottom:1px solid var(--border);text-align:center;">Jan</div>
          <div style="padding:5px 0;color:var(--text-faint);border-bottom:1px solid var(--border);text-align:center;">Feb</div>
          <div style="padding:5px 0;color:var(--text-faint);border-bottom:1px solid var(--border);">Status</div>
          ${prGoals.map(r => {
            const sc = r.status === 'close' ? '#F59E0B' : '#3B82F6';
            return `<div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text-soft);">${r.lift}</div>
            <div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);color:var(--green);">${r.goal}</div>
            <div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;color:var(--text-muted);">${r.jan}</div>
            <div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;color:${r.status==='close'?'#F59E0B':'var(--text-muted)'};">${r.feb}</div>
            <div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);"><span style="font-size:9px;padding:2px 6px;border-radius:8px;background:${r.status==='close'?'rgba(245,158,11,.12)':'rgba(59,130,246,.1)'};color:${sc};">${r.status}</span></div>`;
          }).join('')}
        </div>
      </div>`;

    const physNote = `<div style="padding:12px 14px;background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.15);border-radius:var(--r-sm);font-size:12px;color:var(--text-soft);line-height:1.6;">
      <span style="font-family:var(--mono);font-size:9px;color:#22C55E;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px;">Training Standard</span>
      Push / Pull / Legs: minimum one full cycle per week · Cardio: minimum one dedicated session per week
    </div>`;

    h += sec('physical', '#22C55E', 'Physical', aftTable + prTable + physNote);

    // ════════════════════════════════════════════
    // 4. FINANCIAL
    // ════════════════════════════════════════════

    // Savings progress toward $10k SVG bar
    const savingsPct = Math.min(100, (savingsProgress[savingsProgress.length-1].cumulative / savingsTarget) * 100);
    const savingsBar = `
      <div style="padding:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:10px;">
        <div style="font-family:var(--mono);font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;">Annual Savings Progress — Target $10,000</div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:10px;">
          <span style="font-size:28px;font-weight:700;font-family:var(--mono);color:var(--green);">$${savingsProgress[savingsProgress.length-1].cumulative.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
          <span style="font-family:var(--mono);font-size:11px;color:var(--text-muted);">of $10,000 · ${savingsPct.toFixed(1)}%</span>
        </div>
        <div style="height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-bottom:10px;">
          <div style="height:100%;width:${savingsPct}%;background:linear-gradient(90deg,#22C55E,#4ADE80);border-radius:4px;"></div>
        </div>
        <div style="display:flex;gap:8px;font-family:var(--mono);font-size:10px;color:var(--text-muted);">
          ${savingsProgress.map(m => `<span style="padding:3px 8px;background:rgba(255,255,255,.04);border-radius:6px;"><span style="color:var(--text);">${m.month}</span> +$${m.net.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span>`).join(' → ')}
          <span style="margin-left:auto;color:var(--text-faint);">$${(savingsTarget - savingsProgress[savingsProgress.length-1].cumulative).toLocaleString(undefined,{minimumFractionDigits:0})} remaining</span>
        </div>
      </div>`;

    const acctTable = `
      <div style="padding:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:10px;">
        <div style="font-family:var(--mono);font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;">Starting Account Baselines (Jan 1, 2026)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;">
          ${accountBaselines.map(a => `<div style="text-align:center;">
            <div style="font-size:16px;font-weight:700;font-family:var(--mono);color:var(--text);">${a.symbol}${a.baseline.toLocaleString()}</div>
            <div style="font-size:10px;color:var(--text-faint);margin-top:2px;">${a.name}</div>
          </div>`).join('')}
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--text-faint);font-style:italic;">Baseline reference only. Monthly reports track changes relative to these starting points.</div>
      </div>`;

    const finGoalsHtml = `
      <div style="padding:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r-md);">
        <div style="font-family:var(--mono);font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;">Financial Targets</div>
        ${financialGoals.map(g => `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);">
          <span style="font-size:12px;color:var(--text-soft);">${g.label}</span>
          <span style="font-family:var(--mono);font-size:11px;color:var(--green);">${g.goal}</span>
        </div>`).join('')}
        <div style="margin-top:8px;font-size:11px;color:var(--text-faint);">Expected monthly income: $2,500–$3,000</div>
      </div>`;

    h += sec('financial', '#F59E0B', 'Financial', savingsBar + acctTable + finGoalsHtml);

    // ════════════════════════════════════════════
    // 5. INTELLECTUAL
    // ════════════════════════════════════════════
    const completedCount = intellectualPlan.filter(r => r.status === 'complete').length;
    const missedCount = intellectualPlan.filter(r => r.status === 'missed').length;
    const amendedCount = intellectualPlan.filter(r => r.status === 'amended').length;

    const intelTable = `
      <div style="padding:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:10px;">
        <div style="font-family:var(--mono);font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;">Monthly Focus Plan — 2026</div>
        <div style="display:grid;grid-template-columns:40px 1fr 80px;gap:0;font-family:var(--mono);font-size:10px;">
          <div style="padding:5px 0;color:var(--text-faint);border-bottom:1px solid var(--border);">Mo</div>
          <div style="padding:5px 0;color:var(--text-faint);border-bottom:1px solid var(--border);">Topic</div>
          <div style="padding:5px 0;color:var(--text-faint);border-bottom:1px solid var(--border);text-align:center;">Status</div>
          ${intellectualPlan.map(r => {
            const sc = r.status==='complete' ? '#22C55E'
                     : r.status==='missed'   ? '#EF4444'
                     : r.status==='amended'  ? '#F59E0B'
                     : 'rgba(255,255,255,.2)';
            const bg = r.status==='complete' ? 'rgba(34,197,94,.08)'
                     : r.status==='missed'   ? 'rgba(239,68,68,.08)'
                     : r.status==='amended'  ? 'rgba(245,158,11,.08)'
                     : 'rgba(255,255,255,.03)';
            const label = r.status==='complete' ? 'Complete'
                        : r.status==='missed'   ? 'MISSED'
                        : r.status==='amended'  ? 'Amended'
                        : '—';
            return `<div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text-muted);">${r.month}</div>
            <div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);">
              <span style="color:var(--text-soft);">${r.topic}</span>
              ${r.result ? `<div style="font-size:10px;color:${sc};margin-top:2px;">${r.result}</div>` : ''}
            </div>
            <div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;">
              <span style="font-size:9px;padding:2px 7px;border-radius:8px;background:${bg};color:${sc};">${label}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div style="padding:12px 14px;background:rgba(192,132,252,.05);border:1px solid rgba(192,132,252,.15);border-radius:var(--r-sm);font-size:12px;color:var(--text-soft);line-height:1.6;">
        <span style="font-family:var(--mono);font-size:9px;color:#C084FC;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px;">Amended: March</span>
        Original goal was U.S./World History. Changed to ARNG military training: JCR, Radio Classes, Casualty Packets, Receiving Reports. February STEM goal was not completed — acknowledged.
      </div>`;

    const intelStandard = `
      <div style="padding:12px 14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r-sm);margin-top:10px;font-size:11px;color:var(--text-muted);line-height:1.7;">
        <span style="font-family:var(--mono);font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px;">Monthly Standard</span>
        <b style="color:var(--text-soft);">Input:</b> Audio 6–8 hrs/month (≈2 hrs/week) · Reading 3–5 short articles · ≥2 different sources<br>
        <b style="color:var(--text-soft);">Output:</b> 1-page synthesis memo (500–700 words) OR 10–12 bullet brief OR 5-min voice memo from memory<br>
        <b style="color:var(--text-soft);">Verification:</b> Recall test without notes · Transfer test applied to job, finance, fitness, leadership, or current event
      </div>`;

    h += sec('intellectual', '#C084FC', 'Intellectual', intelTable + intelStandard);

    // ════════════════════════════════════════════
    // 6. CREATIVE
    // ════════════════════════════════════════════
    const creativeGoals = `
      <div style="padding:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:10px;">
        <div style="font-family:var(--mono);font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;">2026 Creative Goals — JD Meyers Productions</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(244,114,182,.05);border:1px solid rgba(244,114,182,.15);border-radius:var(--r-sm);">
            <div>
              <div style="font-size:12px;color:var(--text-soft);font-weight:600;">Weddings</div>
              <div style="font-size:11px;color:var(--text-faint);margin-top:2px;">Complete 3–4 weddings during the year</div>
            </div>
            <div style="text-align:right;">
              <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:#F472B6;">0 / 4</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--text-faint);">2 booked</div>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(244,114,182,.05);border:1px solid rgba(244,114,182,.15);border-radius:var(--r-sm);">
            <div>
              <div style="font-size:12px;color:var(--text-soft);font-weight:600;">Photo Shoots</div>
              <div style="font-size:11px;color:var(--text-faint);margin-top:2px;">Complete 6 shoots — paid or unpaid</div>
            </div>
            <div style="text-align:right;">
              <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:#F472B6;">1 / 6</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--text-faint);">Jan: CU EMS headshots (13 subjects)</div>
            </div>
          </div>
        </div>
      </div>`;

    h += sec('creative', '#F472B6', 'Creative', creativeGoals);

    // ════════════════════════════════════════════
    // 7. MONTHLY REFLECTIONS NOTE
    // ════════════════════════════════════════════
    const reflectionNote = `
      <div style="padding:14px 16px;background:rgba(255,255,255,.02);border-left:2px solid rgba(255,255,255,.15);border-radius:0 var(--r-sm) var(--r-sm) 0;font-size:12px;color:var(--text-soft);line-height:1.8;">
        <span style="font-family:var(--mono);font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px;">Monthly Reflection Standard</span>
        Each month includes a short narrative summarizing progress across five areas: spiritual growth through sermon themes, Bible reading, and prayer; physical readiness measured against AFT standards and training consistency; financial discipline relative to spending, tithing, and savings targets; intellectual development based on the month's learning topic; and creative output tied to photo, video, or business progress.
        <div style="margin-top:8px;font-style:italic;color:var(--text-faint);">Purpose: synthesis and continuity, not detailed reporting.</div>
      </div>`;
    h += sec('reflection', 'rgba(255,255,255,.25)', 'Monthly Reflection Standard', reflectionNote);

    el.innerHTML = h;
  }

  // ===== INIT =====
  fromHash();
  render();
})();
</script>
</body>
</html>
