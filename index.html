<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JD Monthly Recap — 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0E0E11;
      --surface: #18181C;
      --border: rgba(255,255,255,.08);
      --text: #F4F4F5;
      --text-muted: #71717A;
      --green: #22C55E;
      --accent: #3B82F6;
      --purple: #A855F7;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .header-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 13px;
      color: var(--text-muted);
      font-family: var(--mono);
    }
    .months {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      max-width: 600px;
    }
    .month-card {
      display: block;
      text-decoration: none;
      width: 160px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: border-color .15s, transform .15s;
      cursor: pointer;
    }
    .month-card:hover {
      border-color: rgba(255,255,255,.2);
      transform: translateY(-2px);
    }
    .month-card.latest {
      border-color: rgba(59,130,246,.4);
      background: rgba(59,130,246,.05);
    }
    .month-card.latest:hover {
      border-color: rgba(59,130,246,.7);
    }
    .card-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .card-month {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card-year {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
    }
    .card-badge {
      display: inline-block;
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 8px;
      background: rgba(59,130,246,.15);
      color: var(--accent);
    }
    .footer {
      margin-top: 48px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-label">JD Meyers · 2026</div>
    <h1>Monthly Recap</h1>
    <p>Spiritual · Physical · Financial · Intellectual · Creative</p>
  </div>

  <div class="months" id="monthGrid">

    <a class="month-card" href="2026-01.html">
      <div class="card-label">Month 01</div>
      <div class="card-month">January</div>
      <div class="card-year">2026</div>
    </a>

    <a class="month-card latest" href="2026-02.html">
      <div class="card-label">Month 02</div>
      <div class="card-month">February</div>
      <div class="card-year">2026</div>
      <span class="card-badge">latest</span>
    </a>

    <!-- ADD NEW MONTHS HERE — copy a card block above, update the number, month name, href, and move the "latest" class -->

  </div>

  <div class="footer">
    Add a new month: upload 2026-XX.html · add a card above · move "latest" badge<br>
    Hosted on GitHub Pages
  </div>

</body>
</html>
