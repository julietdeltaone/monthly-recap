<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD Monthly Recap — March 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0A0B0C;--bg2:#111214;--bg3:#18191D;--bg4:#1F2025;--bg5:#272830;
  --b0:rgba(255,255,255,.05);--b1:rgba(255,255,255,.10);--b2:rgba(255,255,255,.20);--b3:rgba(255,255,255,.32);
  --tx:#F7F5F0;--t2:#D8D4CC;--t3:#A09A93;--t4:#5E5A56;--t5:#2A2826;
  --gold:#E0B44E;--gbg:rgba(224,180,78,.14);--gdim:rgba(224,180,78,.07);
  --sage:#62C97A;--sbg:rgba(98,201,122,.14);--sdim:rgba(98,201,122,.07);
  --rust:#D9714E;--rbg:rgba(217,113,78,.14);
  --sky:#5FADD4;--kbg:rgba(95,173,212,.14);--kdim:rgba(95,173,212,.07);
  --vio:#9A8FD8;--vbg:rgba(154,143,216,.14);
  --rose:#CC7888;--robg:rgba(204,120,136,.14);
  --teal:#4BBDB8;--tbg:rgba(75,189,184,.14);
  --serif:'Libre Baskerville',Georgia,serif;
  --sans:'DM Sans',-apple-system,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r1:6px;--r2:10px;--r3:16px;--r4:20px;
  --sh1:0 2px 12px rgba(0,0,0,.8);
  --sh2:0 6px 40px rgba(0,0,0,.92);
  --sh3:0 20px 80px rgba(0,0,0,.98);
  --glow-gold:0 0 24px rgba(224,180,78,.18);
  --glow-sage:0 0 24px rgba(98,201,122,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}

@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 rgba(224,180,78,0)}50%{box-shadow:0 0 28px rgba(224,180,78,.15)}}
@keyframes shimmer{from{background-position:-200% 0}to{background-position:200% 0}}
.ca{opacity:0;transform:translateY(22px)}.ca.vis{animation:slideUp .52s cubic-bezier(.22,.68,0,1.1) both}
.ca.vis.d1{animation-delay:.08s}.ca.vis.d2{animation-delay:.16s}.ca.vis.d3{animation-delay:.24s}
.ca.vis.d4{animation-delay:.32s}.ca.vis.d5{animation-delay:.40s}
/* Scale-in variant for dashboard tiles */
.ca-scale{opacity:0;transform:scale(.95)}.ca-scale.vis{animation:scaleIn .42s cubic-bezier(.34,1.2,.64,1) both}
.ca-scale.vis.d1{animation-delay:.06s}.ca-scale.vis.d2{animation-delay:.12s}
.ca-scale.vis.d3{animation-delay:.18s}.ca-scale.vis.d4{animation-delay:.24s}
.ca-scale.vis.d5{animation-delay:.30s}.ca-scale.vis.d6{animation-delay:.36s}

.shell{max-width:1340px;margin:0 auto;padding:40px 28px 100px}
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-bottom:22px;border-bottom:1px solid var(--b1)}
.hdr-l{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
.hdr h1{font-family:var(--serif);font-size:23px;font-weight:700;font-style:italic;letter-spacing:-.3px}
.mlbl{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:1.2px;text-transform:uppercase}
.hdr-r{display:flex;gap:8px}
.pill{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.7px;text-transform:uppercase;padding:6px 14px;border:1px solid var(--b1);border-radius:40px;background:var(--bg3);color:var(--t3);cursor:pointer;transition:all .18s;box-shadow:var(--sh1)}
.pill:hover{color:var(--tx);border-color:var(--b2);background:var(--bg4)}
.tabs{display:flex;gap:2px;padding:14px 0 0;flex-wrap:wrap;position:sticky;top:0;z-index:100;background:var(--bg);padding-bottom:10px;margin-bottom:-10px;border-bottom:1px solid var(--b0)}
.tab{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;padding:7px 16px;border:1px solid transparent;border-radius:40px;background:none;color:var(--t4);cursor:pointer;transition:color .22s ease,border-color .22s ease,background .22s ease,transform .18s cubic-bezier(.34,1.2,.64,1);position:relative}
.tab:hover{color:var(--t2);border-color:var(--b1);background:rgba(255,255,255,.04);transform:translateY(-1px)}
.tab.on{color:var(--tx);border-color:var(--b2);background:var(--bg4);box-shadow:var(--sh1);transform:translateY(-1px)}
/* tab color accents when active */
.tab[data-t="spiritual"].on{border-color:rgba(212,168,75,.4);color:var(--gold)}
.tab[data-t="physical"].on{border-color:rgba(90,157,192,.4);color:var(--sky)}
.tab[data-t="financial"].on{border-color:rgba(92,184,114,.4);color:var(--sage)}
.tab[data-t="intellectual"].on{border-color:rgba(90,157,192,.4);color:var(--sky)}
.tab[data-t="creative"].on{border-color:rgba(192,112,128,.4);color:var(--rose)}
/* back to top */
#btt{position:fixed;bottom:28px;right:28px;width:40px;height:40px;border-radius:50%;background:var(--bg4);border:1px solid var(--b2);color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s,transform .2s,box-shadow .2s;box-shadow:var(--sh2);z-index:500}
#btt.show{opacity:1}
#btt:hover{transform:translateY(-2px);box-shadow:var(--sh3);color:var(--tx);border-color:var(--b3)}
/* loading flash on tab switch */
@keyframes tabFade{from{opacity:.4}to{opacity:1}}
.content.switching{animation:tabFade .22s ease}
/* sidebar section quick links */
.sqlink{display:block;font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:5px 0;border-bottom:1px solid var(--b0);cursor:pointer;transition:color .15s}
.sqlink:last-child{border-bottom:none}
.sqlink:hover{color:var(--tx)}
/* keyboard shortcut hint */
.kbhint{font-family:var(--mono);font-size:9px;color:var(--t4);background:var(--bg3);border:1px solid var(--b0);border-radius:3px;padding:1px 5px;display:inline-block}
.dash{display:grid;grid-template-columns:250px 1fr;gap:24px;margin-top:26px;align-items:start}
@media(max-width:860px){.dash{grid-template-columns:1fr}.side{order:2}.content{order:1}}
.side{display:flex;flex-direction:column;gap:14px;position:sticky;top:20px}
.sc{background:var(--bg2);border:1px solid var(--b0);border-radius:var(--r3);padding:17px;box-shadow:var(--sh1);transition:border-color .28s ease,transform .24s cubic-bezier(.34,1.2,.64,1)}
.sc:hover{border-color:var(--b2);transform:translateY(-1px)}
.sgt{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:1.6px;text-transform:uppercase;color:var(--t4);margin-bottom:11px}
.si{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--b0)}
.si:last-child{border-bottom:none}
.sk{font-size:12px;color:var(--t3)}.sv{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--tx)}
.hchip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;margin:0 4px 5px 0;border:1px solid var(--b0);border-radius:40px;font-size:11px;color:var(--t2);background:var(--bg4);cursor:default;transition:border-color .15s,transform .15s}
.hchip:hover{border-color:var(--b2);transform:translateY(-1px)}
.hdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.content{min-width:0}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:860px){.cg{grid-template-columns:1fr}}
.sf{grid-column:1/-1}
.card{background:var(--bg2);border:1px solid var(--b0);border-radius:var(--r3);padding:22px;box-shadow:var(--sh1);transition:border-color .32s ease,box-shadow .32s ease,transform .28s cubic-bezier(.34,1.2,.64,1)}
.card:hover{border-color:var(--b2);box-shadow:var(--sh2);transform:translateY(-2px)}
.ch{margin-bottom:15px}
.ct{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--tx);font-style:italic}
.cs{font-size:11px;color:var(--t3);margin-top:3px}
.secdiv{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--b0)}
.secacc{width:3px;height:16px;border-radius:2px;flex-shrink:0}
.sectit{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--tx);font-style:italic}

/* PROGRESS BAND */
.prog-band{background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-radius:var(--r2);padding:14px 16px;margin-bottom:16px;border-left:3px solid var(--sky)}
.prog-band .pb-lbl{font-family:var(--mono);font-size:9px;color:var(--sky);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.pb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.pb-stat{background:var(--bg2);border:1px solid var(--b0);border-radius:var(--r1);padding:9px 11px;cursor:default;transition:border-color .15s}
.pb-stat:hover{border-color:var(--b2)}
.pb-k{font-family:var(--mono);font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.pb-v{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--tx)}
.pb-d{font-size:11px;color:var(--t3);margin-top:3px;line-height:1.4}
.delta-up{color:var(--sage)}.delta-dn{color:var(--rust)}.delta-eq{color:var(--t3)}

/* COMMENTARY CALLOUT (dissolved into sections) */
.comm-note{margin-top:14px;padding:14px 16px;border-left:3px solid var(--gold);background:var(--gdim);border-radius:0 var(--r1) var(--r1) 0;font-size:13px;line-height:1.72;color:var(--t2)}
.comm-note .cnl{font-style:normal;font-family:var(--mono);font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:6px;font-weight:500}

/* OVERVIEW DASHBOARD */
.ov-dash{display:flex;flex-direction:column;gap:20px}
.ov-30sec{background:linear-gradient(135deg,rgba(224,180,78,.07) 0%,rgba(95,173,212,.05) 100%);border:1px solid rgba(224,180,78,.2);border-radius:var(--r4);padding:22px 28px;position:relative;overflow:hidden}
.ov-30sec::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 0% 0%,rgba(224,180,78,.06) 0%,transparent 60%);pointer-events:none}
.ov-30sec-lbl{font-family:var(--mono);font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.ov-30sec-lbl::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--gold)}
.ov-bullets{display:flex;flex-direction:column;gap:7px}
.ov-bullet{font-size:13.5px;color:var(--t2);line-height:1.5;display:flex;align-items:baseline;gap:10px}
.ov-bullet b{color:var(--tx)}
.ov-bullet::before{content:'';font-family:var(--mono);font-size:10px;color:var(--t5);flex-shrink:0}
/* Big stat tiles */
.ov-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:700px){.ov-kpi-row{grid-template-columns:repeat(2,1fr)}}
.ov-kpi-tile{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r3);padding:20px 18px;cursor:pointer;transition:border-color .28s ease,transform .24s cubic-bezier(.34,1.2,.64,1),box-shadow .28s ease;position:relative;overflow:hidden}
.ov-kpi-tile:hover{border-color:var(--b3);transform:translateY(-3px);box-shadow:var(--sh2)}
.ov-kpi-tile::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;border-radius:0 0 var(--r3) var(--r3)}
.ov-kpi-tile.c-gold::after{background:var(--gold)}
.ov-kpi-tile.c-sage::after{background:var(--sage)}
.ov-kpi-tile.c-sky::after{background:var(--sky)}
.ov-kpi-tile.c-rose::after{background:var(--rose)}
.ov-kpi-v{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1;margin-bottom:4px}
.ov-kpi-k{font-family:var(--mono);font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.ov-kpi-sub{font-size:11px;color:var(--t3);line-height:1.4}
/* Charts row */
.ov-charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:860px){.ov-charts-row{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.ov-charts-row{grid-template-columns:1fr}}
.ov-chart-card{background:var(--bg2);border:1px solid var(--b0);border-radius:var(--r3);padding:18px;transition:border-color .28s ease}
.ov-chart-card:hover{border-color:var(--b2)}
.ov-chart-lbl{font-family:var(--mono);font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
/* Timeline at bottom */
.ov-timeline-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.ov-timeline-row{grid-template-columns:1fr}}

/* OVERVIEW */
.ovb{display:flex;align-items:center;justify-content:space-between;padding:26px 30px;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r4);gap:20px;flex-wrap:wrap;box-shadow:var(--sh2);position:relative;overflow:hidden}
.ovb::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 0% 50%,rgba(224,180,78,.07) 0%,transparent 50%),radial-gradient(ellipse at 100% 50%,rgba(95,173,212,.05) 0%,transparent 50%);pointer-events:none}
.ovb::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(224,180,78,.32),transparent);pointer-events:none}
.ovbm{font-family:var(--serif);font-size:34px;font-weight:700;font-style:italic;color:var(--tx);line-height:1.1;position:relative}
.ovbs{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:7px;letter-spacing:.5px;text-transform:uppercase;position:relative}
.kpis{display:flex;gap:32px;flex-shrink:0;position:relative}
.kpi{display:flex;flex-direction:column;align-items:flex-end;gap:3px;cursor:pointer;transition:opacity .15s}
.kpi:hover{opacity:.8}
.kpiv{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--tx)}
.kpiv.ok{color:var(--sage)}.kpiv.warn{color:var(--gold)}.kpiv.bad{color:var(--rust)}
.kpik{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px}
.ovcols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ovcol{display:flex;flex-direction:column;gap:10px}
.ovs{background:var(--bg2);border:1px solid var(--b0);border-radius:var(--r2);padding:13px 15px;transition:border-color .2s,box-shadow .2s,transform .2s;cursor:pointer}
.ovs:hover{border-color:var(--b2);box-shadow:var(--sh1);transform:translateY(-1px)}
.ovsl{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:9px}
.ovr{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;border-bottom:1px solid var(--b0);gap:8px}
.ovr:last-child{border-bottom:none}
.ovrk{font-size:12px;color:var(--t2)}.ovrv{font-size:12px;font-weight:600;color:var(--tx);text-align:right}
.ovrv.ok{color:var(--sage)}.ovrv.warn{color:var(--gold)}.ovrv.bad{color:var(--rust)}.ovrv.dim{color:var(--t3);font-weight:400}
.ove{display:flex;align-items:flex-start;gap:10px;padding:5px 0;border-bottom:1px solid var(--b0);font-size:12px}
.ove:last-child{border-bottom:none}
.oved{font-family:var(--mono);font-size:10px;color:var(--t4);white-space:nowrap;flex-shrink:0;width:58px;padding-top:1px}
.ovet{color:var(--t2);line-height:1.4}.ovet b{color:var(--tx);font-weight:600}
@keyframes fadeSlideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes growBar{from{width:0}to{}}

/* VERTICAL TIMELINE  shared across all tab sidebars */
.tl{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:8px;align-items:flex-start}
.tl-rail{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:14px;padding-top:3px}
.tl-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0}
.tl-dot.done{background:currentColor}
.tl-dot.cur{background:rgba(212,168,75,.35);border-color:var(--gold)}
.tl-dot.future{background:transparent;border-color:var(--t5)}
.tl-line{width:1px;flex:1;min-height:14px;background:var(--b1);margin:2px 0}
.tl-line.done{background:var(--sage)}
.tl-content{padding-bottom:8px;flex:1;min-width:0}
.tl-month{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.tl-label{font-size:11px;line-height:1.35}
.tl-sub{font-family:var(--mono);font-size:9px;color:var(--t4);margin-top:1px}
.tl-badge{display:inline-block;font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:10px;margin-top:2px}

@media(max-width:640px){.ovcols{grid-template-columns:1fr}.ovb{flex-direction:column}.kpis{justify-content:space-between;width:100%}.kpi{align-items:flex-start}}

/* CALENDAR */
.calg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.caldow{text-align:center;font-family:var(--mono);font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--t4);padding:6px 0}
.calday{text-align:center;padding:4px 2px;color:var(--t3);font-size:11px;font-family:var(--mono)}
.calnum{display:inline-flex;align-items:center;justify-content:center;width:27px;height:27px;border-radius:50%;transition:transform .18s,background .18s,box-shadow .18s}
.calday.hs .calnum{background:var(--gold);color:#16140E;font-weight:700;cursor:pointer;box-shadow:0 0 14px rgba(212,168,75,.45)}
.calday.hs:hover .calnum{transform:scale(1.2);box-shadow:0 0 22px rgba(212,168,75,.65)}
.calday.emp{visibility:hidden}
.callgd{margin-top:12px;font-size:11px;color:var(--t3);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.callgi{display:flex;align-items:center;gap:6px}
.ldot{width:8px;height:8px;border-radius:50%}

/* SERMONS */
.sblk{border:1px solid var(--b0);border-radius:var(--r3);background:var(--bg2);overflow:hidden;box-shadow:var(--sh1);transition:border-color .22s,box-shadow .22s;margin-bottom:10px}
.sblk:last-child{margin-bottom:0}.sblk:hover{border-color:var(--b2);box-shadow:var(--sh2)}
.shdr{padding:18px 22px;border-bottom:1px solid transparent;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;user-select:none;transition:background .15s}
.shdr:hover{background:var(--bg3)}.sblk.open .shdr{border-bottom-color:var(--b0);background:var(--bg3)}
.snum{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.5px;margin-bottom:3px}
.sdate{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.stitle{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--tx);line-height:1.3;font-style:italic}
.schev{font-size:12px;color:var(--t4);transition:transform .28s,color .18s;flex-shrink:0;margin-top:4px}
.sblk.open .schev{transform:rotate(180deg);color:var(--gold)}
.sbody{max-height:0;overflow:hidden;transition:max-height .56s cubic-bezier(.4,0,.2,1),opacity .32s ease}
.sblk.open .sbody{max-height:3000px;opacity:1}
.sblk:not(.open) .sbody{opacity:0}
.sbodyi{padding:20px 22px;font-size:13px;line-height:1.8;color:var(--t2)}
.sbodyi h4{font-family:var(--serif);font-size:13px;font-weight:700;color:var(--tx);margin:16px 0 5px;font-style:italic}
.sbodyi h4:first-child{margin-top:0}
.sbodyi p{margin:0 0 10px}.sbodyi p:last-child{margin-bottom:0}
.stags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px;padding-bottom:11px;border-bottom:1px solid var(--b0)}
.stag{font-family:var(--mono);font-size:9px;letter-spacing:.6px;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--b1);color:var(--t3);background:var(--bg);cursor:default;transition:border-color .15s,color .15s}

.scomm{margin-top:16px;padding:14px 16px;border-left:3px solid var(--gold);background:var(--gdim);border-radius:0 var(--r1) var(--r1) 0;font-size:12.5px;line-height:1.74;color:var(--t2);font-style:italic}
.scomml{font-style:normal;font-family:var(--mono);font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:5px;font-weight:500}

/* HEATMAP */
.hmg{display:grid;grid-template-columns:26px repeat(7,1fr);gap:4px}
.hmdow{text-align:center;font-family:var(--mono);font-size:8px;letter-spacing:.5px;text-transform:uppercase;color:var(--t4);padding:4px 0}

.hmc{aspect-ratio:1;border-radius:4px;cursor:pointer;transition:transform .18s,box-shadow .18s}

.hmc.emp{background:transparent;cursor:default;pointer-events:none}
.hmc.rest{background:rgba(255,255,255,.03);cursor:default;border:1px solid rgba(255,255,255,.04)}
.hmc.rest:hover{transform:none;box-shadow:none}
.hmleg{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;font-family:var(--mono);font-size:9px;color:var(--t3)}
.hmlgi{display:flex;align-items:center;gap:5px}
.hmlgb{width:11px;height:11px;border-radius:3px;flex-shrink:0}
#hmtip{position:fixed;background:var(--bg4);border:1px solid var(--b2);border-radius:var(--r1);padding:8px 12px;font-family:var(--mono);font-size:10px;color:var(--tx);pointer-events:none;z-index:9999;opacity:0;transition:opacity .15s;max-width:300px;white-space:normal;line-height:1.5;box-shadow:var(--sh2)}
#hmtip.show{opacity:1}

/* AFT RINGS */
.aftrw{position:relative;width:200px;height:200px;margin:0 auto 16px}
.aftrc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.aftrv{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--tx)}
.aftrk{font-family:var(--mono);font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.aftrow{display:grid;grid-template-columns:1fr 60px 34px;align-items:center;gap:8px;margin-bottom:9px;padding:5px 7px;border-radius:var(--r1);transition:background .15s;cursor:pointer}
.aftrow:hover{background:var(--bg3)}
.aftn{font-size:12px;color:var(--t2)}
.aftbw{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.aftbf{height:100%;border-radius:2px}
.aftp{font-family:var(--mono);font-size:10px;text-align:right}

/* MUSCLE DETAIL MODAL */
.muscle-modal-overlay{position:fixed;inset:0;background:rgba(8,9,11,.88);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;z-index:10000}
.muscle-modal-overlay.show{display:flex}
.muscle-modal{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r4);width:min(620px,calc(100vw - 32px));max-height:82vh;overflow:hidden;box-shadow:var(--sh3);animation:modalIn .32s cubic-bezier(.22,.68,0,1.15) both}
.mmod-hdr{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--b0)}
.mmod-body{padding:22px;overflow-y:auto;max-height:calc(82vh - 70px);scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}

/* FINANCIAL */
.fsg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.fkpi{background:var(--bg3);border:1px solid var(--b0);border-radius:var(--r2);padding:14px 15px;text-align:center;transition:border-color .2s,transform .2s;cursor:default}
.fkpi:hover{border-color:var(--b2);transform:translateY(-2px)}
.fkpiv{font-family:var(--serif);font-size:23px;font-weight:700;font-style:italic;line-height:1.1}
.fkpik{font-family:var(--mono);font-size:9px;color:var(--t4);letter-spacing:1px;text-transform:uppercase;margin-top:5px}
.savout{height:5px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin:9px 0}
.savin{height:100%;background:linear-gradient(90deg,var(--sky),var(--sage));border-radius:4px;transition:width 1s cubic-bezier(.22,.68,0,1.2)}
.savm{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.savc{font-family:var(--mono);font-size:10px;color:var(--t3)}
.savc.cur{color:var(--sage)}
.fcat{border:1px solid var(--b0);border-radius:var(--r2);background:var(--bg3);overflow:hidden;margin-bottom:8px;transition:border-color .2s}
.fcat:last-child{margin-bottom:0}.fcat:hover{border-color:var(--b1)}
.fcath{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;gap:10px;transition:background .15s}
.fcath:hover{background:rgba(255,255,255,.02)}
.fcat.open .fcath{background:rgba(255,255,255,.02)}
.fcatl{display:flex;align-items:center;gap:9px;min-width:0}
.fcatdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fcatn{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap}
.fcatnt{font-family:var(--mono);font-size:10px;color:var(--t4);margin-left:2px}
.fcatr{display:flex;align-items:center;gap:10px;flex-shrink:0}
.fcatp{font-family:var(--mono);font-size:10px;color:var(--t3)}
.fcata{font-family:var(--mono);font-size:10px;color:var(--t4);transition:transform .25s}
.fcat.open .fcata{transform:rotate(90deg)}
.fcatamt{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--tx)}
.fcatbar{height:2px;background:rgba(255,255,255,.04)}
.fcatbf{height:100%;transition:width .8s cubic-bezier(.22,.68,0,1.2)}
.fcatb{max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1),opacity .3s ease;opacity:0}
.fcat.open .fcatb{max-height:2000px;opacity:1}
.ftx{display:grid;grid-template-columns:46px 1fr auto;gap:8px;padding:6px 14px;border-bottom:1px solid var(--b0);font-size:12px;align-items:center}
.ftx:last-child{border-bottom:none}
.ftx:hover{background:rgba(255,255,255,.04);padding:5px 14px}
.ftxd{font-family:var(--mono);font-size:10px;color:var(--t4)}
.ftxn{color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ftxa{font-family:var(--mono);font-size:11px;white-space:nowrap}
.ftxa.neg{color:var(--t2)}.ftxa.pos{color:var(--sage)}

/* SUBSCRIPTIONS */
.sub-row{display:grid;grid-template-columns:1fr 90px 80px 70px;gap:8px;padding:9px 12px;border-bottom:1px solid var(--b0);font-size:12px;align-items:center;transition:background .12s;cursor:default;border-radius:var(--r1)}
.sub-row:last-child{border-bottom:none}.sub-row:hover{background:rgba(255,255,255,.03)}
.sub-row.inactive{opacity:.4}
.sub-name{color:var(--tx);font-weight:500}
.sub-card{font-family:var(--mono);font-size:10px;color:var(--t4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-amt{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--tx);text-align:right}
.sub-freq{font-family:var(--mono);font-size:9px;color:var(--t4);text-transform:uppercase;text-align:right}
.sub-status{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:20px;text-align:center;display:inline-block;margin-left:auto}

/* INTEL */
.ipr{display:grid;grid-template-columns:44px 1fr 80px;padding:8px 6px;border-bottom:1px solid var(--b0);font-size:13px;align-items:center;transition:background .15s;cursor:default;border-radius:var(--r1)}
.ipr:last-child{border-bottom:none}.ipr:hover{background:var(--bg3)}
.imo{font-family:var(--mono);font-size:10px;color:var(--t4)}
.itop{color:var(--t2)}
.ibadge{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:20px;text-align:center;display:inline-block}

/* CREATIVE */
.ptbl{width:100%;border-collapse:collapse;font-size:13px}
.ptbl th{text-align:left;padding:8px 10px 8px 0;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);font-weight:500;border-bottom:1.5px solid var(--b1)}
.ptbl td{padding:10px 10px 10px 0;border-bottom:1px solid var(--b0);transition:background .12s}
.ptbl tr:last-child td{border-bottom:none}
.ptbl tbody tr:hover td{background:rgba(255,255,255,.025)}
.ptbl tr.dm td{opacity:.32}
.sbadge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.4px;padding:3px 9px;border-radius:20px;display:inline-block}
.pjcard{padding:15px 17px;background:var(--bg3);border:1px solid var(--b0);border-radius:var(--r2);margin-bottom:9px;transition:border-color .18s,transform .18s,box-shadow .18s;cursor:default}
.pjcard:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:var(--sh2)}
.inrow{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px solid var(--b0)}
.inrow:last-child{border-bottom:none}
.inlbl{display:flex;align-items:center;gap:7px;color:var(--t2)}
.indot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.inamt{font-family:var(--mono);font-size:11px;color:var(--tx);font-weight:500}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(4,5,6,.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:none;align-items:center;justify-content:center;z-index:9999;animation:fadeIn .22s ease both}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r4);width:min(680px,calc(100vw - 32px));max-height:84vh;overflow:hidden;box-shadow:var(--sh3);animation:modalIn .32s cubic-bezier(.22,.68,0,1.15) both}
@keyframes modalIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.mhdr{display:flex;justify-content:space-between;align-items:flex-start;padding:22px;border-bottom:1px solid var(--b0)}
.mhdr h3{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--tx);font-style:italic;line-height:1.3}
.mhdr p{font-size:11px;color:var(--t3);margin-top:3px;font-family:var(--mono)}
.mcls{font-family:var(--mono);font-size:11px;padding:6px 13px;border:1px solid var(--b1);border-radius:40px;background:none;cursor:pointer;color:var(--t3);transition:all .15s;flex-shrink:0}
.mcls:hover{background:var(--bg3);color:var(--tx);border-color:var(--b2)}
.mbody{padding:22px;overflow-y:auto;max-height:calc(84vh - 96px);font-size:13.5px;line-height:1.74;color:var(--t2);scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.mbody p{margin:10px 0}.mbody h4{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--tx);margin:16px 0 5px}
.mbody h4:first-child{margin-top:0}

/* MONTH NAV */
.mnav{display:flex;align-items:center;gap:8px}
.mnav-btn{font-family:var(--mono);font-size:10px;padding:5px 12px;border:1px solid var(--b1);border-radius:40px;background:var(--bg3);color:var(--t3);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.mnav-btn:hover{color:var(--tx);border-color:var(--b2);background:var(--bg4)}
.mnav-sep{font-family:var(--mono);font-size:10px;color:var(--t4)}

/* KEYBOARD HINT TOOLTIP */
#kbhint-panel{position:fixed;bottom:80px;right:28px;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r3);padding:14px 16px;font-family:var(--mono);font-size:10px;color:var(--t2);z-index:500;box-shadow:var(--sh3);opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;pointer-events:none;min-width:180px}
#kbhint-panel.show{opacity:1;transform:translateY(0);pointer-events:auto}
.kbrow{display:flex;justify-content:space-between;gap:16px;padding:3px 0;border-bottom:1px solid var(--b0)}
.kbrow:last-child{border-bottom:none}
.kbkey{background:var(--bg4);border:1px solid var(--b2);border-radius:3px;padding:1px 6px;font-size:9px;color:var(--tx)}

/* PRINT */
@media print{
  .side,.tabs,#btt,.mnav,#kbhint-panel,#schedTip,#hmtip,.calExpandOverlay,.muscle-modal-overlay,.overlay{display:none!important}
  .dash{grid-template-columns:1fr!important}
  .card{break-inside:avoid;box-shadow:none!important;border:1px solid #ddd!important;margin-bottom:12px}
  body{background:#fff!important;color:#000!important}
  .shell{padding:16px!important}
  canvas{max-height:300px}
}

/* SCHEDULE CALENDAR */
.sched-cell{border-radius:var(--r1);padding:5px 6px;cursor:default;transition:background .15s,border-color .15s,transform .15s;min-height:44px}
.sched-cell:hover{transform:scale(1.06);z-index:10;box-shadow:var(--sh2)}


/* VERTICAL TIMELINE  shared across all tab sidebars */
.tl{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:8px;align-items:flex-start}
.tl-rail{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:14px;padding-top:3px}
.tl-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0}

.tl-dot.cur{background:rgba(212,168,75,.35);border-color:var(--gold)}
.tl-dot.future{background:transparent;border-color:var(--t5)}
.tl-line{width:1px;flex:1;min-height:14px;background:var(--b1);margin:2px 0}
.tl-line.done{background:var(--sage)}
.tl-content{padding-bottom:8px;flex:1;min-width:0}
.tl-month{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.tl-label{font-size:11px;line-height:1.35}
.tl-sub{font-family:var(--mono);font-size:9px;color:var(--t4);margin-top:1px}
.tl-badge{display:inline-block;font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:10px;margin-top:2px}

@media(max-width:640px){.shell{padding:16px 14px 60px}.hdr h1{font-size:19px}.cg{gap:12px}.fsg{grid-template-columns:1fr 1fr}canvas{max-height:220px!important}.sf{grid-column:span 1}.sub-row{grid-template-columns:1fr 60px}}

.fin-layout{display:grid;grid-template-columns:1fr;gap:16px}

.fin-header-col{padding:18px 22px}
.fin-header-col+.fin-header-col{border-left:1px solid var(--b0)}

/* Spending accordion hero */

.fcath:hover{background:rgba(255,255,255,.025)}
.fcatl{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.fcatdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fcatn{font-size:13px;color:var(--tx);font-weight:500}
.fcatnt{font-family:var(--mono);font-size:9px;color:var(--t4);margin-left:6px}
.fcatr{display:flex;align-items:center;gap:10px;flex-shrink:0}
.fcatp{font-family:var(--mono);font-size:10px;color:var(--t4)}
.fcata{font-family:var(--mono);font-size:10px;color:var(--t4);transition:transform .2s;display:inline-block}
.fcatamt{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--tx)}
.fcatbar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin:0 4px 4px}
.fcatbf{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.22,.68,0,1.2)}
.fcatb{max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.4,0,.2,1),opacity .3s ease;opacity:0}
.fcat.open .fcatb{max-height:2000px;opacity:1}
.fcat.open .fcata{transform:rotate(90deg)}
.ftx{display:grid;grid-template-columns:44px 1fr 80px;gap:6px;padding:5px 4px;font-size:11px;border-bottom:1px solid var(--b0);align-items:baseline}
.ftx:last-child{border-bottom:none}
.ftxd{font-family:var(--mono);font-size:9px;color:var(--t4)}
.ftxn{color:var(--t2)}
.ftxa{font-family:var(--mono);font-size:10px;text-align:right;font-weight:500}

.sub-row.inactive{opacity:.45}

.fheat-tile{border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;cursor:default;transition:opacity .15s;aspect-ratio:1}

      {id:"s1",num:"01",date:"March 1, 2026",loc:"Calvary Baptist Church",
       title:"Stephen  Acts 6-7: Total Surrender",tags:["Acts 6-7","Phil 4:6-7","Martyrdom"],
       body:`<h4>Overview</h4><p>The life and martyrdom of Stephen in Acts 6 and 7 calls believers to total surrender. Accept whatever role God assigns, stay Spirit-filled, and keep your focus on mission even when opposition comes.</p><h4>1. Your Role Doesn't Limit God's Power</h4><p>Stephen was appointed to wait tables  a humble, practical assignment he never resented or tried to trade up from. The same Holy Spirit working through the apostles worked through Stephen regardless of his title. He served faithfully, performed miracles, and proclaimed truth without ever elevating himself. No role in the Kingdom is greater or lesser, just different.</p><h4>2. Stay on Mission When Opposition Comes</h4><p>Stephen was falsely accused, set up by planted witnesses, and dragged before the Sanhedrin. Rather than defending his reputation he kept his eyes on Christ and stayed on mission. When lies come against you, don't chase them down  it will only pull you away from what God has called you to do.</p><h4>Application</h4><p>Do whatever God asks, stay filled with His Spirit, and don't let attacks on your character pull you off mission. Stephen's life and death is the model.</p>`,
       commentary:`The assignment gap between Stephen's title (table waiter) and his output (miracles, courtroom-level theology, martyrdom with a vision of the throne room) is the whole point. The Spirit doesn't need a prestigious platform. The more interesting question is whether I'm waiting for a bigger assignment before I bring full effort  and whether the answer would embarrass me.`},
      {id:"s2",num:"02",date:"March 8, 2026",loc:"Calvary Baptist Church",
       title:"Acts 8  Persecution, Spread, Simon the Sorcerer",tags:["Acts 7-8","Salvation","Holy Spirit"],
       body:`<h4>Overview</h4><p>Acts 8 shows that persecution scattered the early church and the gospel exploded as a result. The story of Simon the Sorcerer makes clear that belief and baptism alone do not equal salvation.</p><h4>1. Persecution Spreads the Gospel</h4><p>Every time the church has been pressed throughout history, revival has followed. When Stephen was killed and Saul began dragging believers from their homes, the scattered church went everywhere preaching the word. Jews ended up in Samaria  a place they would never have gone otherwise  and a church was born.</p><h4>2. Belief Without the Holy Spirit Is Not Salvation</h4><p>Simon believed, was baptized, and followed Philip everywhere. But when Peter and John arrived and the Holy Spirit moved, Simon tried to buy that power with money. Real salvation is marked by the Holy Spirit producing things in a person's life their flesh is simply not capable of producing on its own.</p><h4>Application</h4><p>Don't settle for the outward appearance of faith without the inward reality. And when pressure comes  what is built on a real foundation will hold.</p>`,
       commentary:`The Simon situation is uncomfortable because it's identifiable. He wasn't outwardly rebellious  he was enthusiastic, present, baptized. His failure point was trying to acquire the Spirit's power as a resource rather than surrendering to the Spirit as Lord. In what areas am I trying to harness spiritual tools for my agenda rather than bringing my agenda under His?`},
      {id:"s3",num:"03",date:"March 22, 2026",loc:"Calvary Baptist Church",
       title:"Acts 9  The Conversion of Saul",tags:["Acts 9:1-9","Transformation","Surrender"],
       body:`<h4>Overview</h4><p>The conversion of Saul in Acts 9 stands as one of the most dramatic transformations in Scripture. It draws a sharp line between simply hearing the truth and actually encountering Christ in a way that changes everything.</p><h4>1. Encountering Christ Demands a Response</h4><p>When Christ appeared to Saul on the road to Damascus, Saul's first words were "who are you, Lord." He already recognized this was truth. And the very next thing out of his mouth was "Lord, what do you want me to do." That question is where real salvation begins.</p><h4>2. Hearing Is Not the Same as Encountering</h4><p>The men traveling with Saul heard everything. But there is no record of any of them changing. That picture is where a large portion of the church lives today  hearing every Sunday, nodding along, but holding onto the world with both hands.</p><h4>Application</h4><p>Stop trying to live with one foot in the church and one foot in the world. The only question that matters is the one Saul asked: Lord, what do you want me to do.</p>`,
       commentary:`The traveling companions are the quiet detail that carries the weight. Same experience. Zero transformation. It raises the hard question about proximity to spiritual things vs. genuine encounter with the Person behind them. I can attend, listen, participate  and still be a traveling companion. The distinguishing mark is whether I'm actually asking Saul's second question and then acting on the answer.`},
      {id:"s4",num:"04",date:"March 29, 2026",loc:"Calvary Baptist Church",
       title:"1 Corinthians 1:17-18  The Message of the Cross",tags:["1 Cor 1:17-24","Isaiah 52-53","The Cross"],
       body:`<h4>Overview</h4><p>1 Corinthians 1:17-18 declares that the message of the cross is foolishness to those who are perishing but the power of God to those being saved. The death Christ died demands to be proclaimed clearly and without apology.</p><h4>1. The Message Cannot Be Softened</h4><p>Churches are removing references to the blood and crucifixion because it is considered too offensive. But that brutal, costly death is exactly the point. Watering it down strips it of the only power it actually has.</p><h4>2. Salvation Is Simpler Than We Make It</h4><p>You do not have to clean yourself up first. Christ takes people exactly as they are and does the changing himself. It is received by faith, not by works, not by tradition.</p><h4>Application</h4><p>Stop apologizing for the message of the cross. It is a hard message because it cost everything. Come as you are, place your faith in what he did, and let him do what only he can do.</p>`,
       commentary:`The softening impulse is real and I recognize it  the instinct to cushion the message to make it land smoother. Brad's point is that this is exactly what strips it of power. The cross is offensive because it is supposed to be. My credibility as someone who says they believe this is tested by whether I present it as offensive-but-true or try to reduce the offense at the expense of the truth.`}
    ]

/* ─ ─ ─  HELPERS ─ ─ ─  */
function delta(cur,prev,prefix='',suffix='',higherBetter=true){
  const d=cur-prev,pct=(d/prev*100).toFixed(1);
  const up=higherBetter?d>=0:d<=0;
  const cls=d===0?'delta-eq':up?'delta-up':'delta-dn';
  const arrow=d===0?'':d>0?'▲ ':'▼ ';
  return `<span class="${cls}" style="font-family:var(--mono);font-size:10px">${arrow} ${prefix}${Math.abs(d).toFixed(2)}${suffix} vs Feb</span>`;
}
function deltaSimple(cur,prev,label,higherBetter=true){
  const d=cur-prev;
  const up=higherBetter?d>=0:d<=0;
  const cls=d===0?'delta-eq':up?'delta-up':'delta-dn';
  const arrow=d===0?'':d>0?'▲ ':'▼ ';
  return `<div class="pb-stat"><div class="pb-k">${label}</div><div class="pb-v">${cur}</div><div class="pb-d"><span class="${cls}">${arrow} ${Math.abs(d)} vs Feb</span></div></div>`;
}

function progressBand(items){

}

  const commNote=`<div class="comm-note" style="margin-top:10px;font-size:11px"><span class="cnl">Commentary</span>AFT goals (5 events): MDL 350lb · HRP 61 · SDC 1:30 · PLK 3:35 · 2MR 13:25. SPT removed from test as of Jun 2025. Plank is the critical gap at 47%. Bench hit 215lb twice. Squat 225×8 Mar 26.</div>`;
  const cardio=ph.cardio.map(c=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--b0)"><span style="font-family:var(--mono);font-size:9px;color:var(--t4)">${c.date}</span><span style="font-size:10px;color:var(--t2)">${c.desc}</span></div>`).join('');

  // ─ ─ ─  INLINE SPARK SVG helper ─ ─ ─ 
  // Returns a tiny 90×22 inline SVG line sparkline
  function spark(vals, color, dashed=false){
    const w=90,h=22,pad=3;
    const mn=Math.min(...vals),mx=Math.max(...vals);
    const xs=vals.map((_,i)=>pad+i*(w-2*pad)/(vals.length-1));
    const ys=vals.map(v=>h-pad-(mx===mn?h/2-pad:(v-mn)/(mx-mn)*(h-2*pad)));
    const pts=xs.map((x,i)=>`${x},${ys[i]}`).join(' ');
    const dashAttr=dashed?'stroke-dasharray="3,2"':'';
    const circles=xs.map((x,i)=>`<circle cx="${x}" cy="${ys[i]}" r="2.5" fill="${color}"/>`).join('');
    return`<svg width="${w}" height="${h}" style="flex-shrink:0;overflow:visible"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" ${dashAttr}/>${circles}</svg>`;
  }
  function sparkBar(vals, color){
    const w=90,h=22,pad=3,bw=12;
    const mx=Math.max(...vals);
    const bars=vals.map((v,i)=>{
      const bh=Math.round((v/mx)*(h-pad));
      const x=pad+i*(w-2*pad)/(vals.length-1)-bw/2;
      return`<rect x="${x}" y="${h-bh}" width="${bw}" height="${bh}" fill="${color}" rx="2" opacity="${.5+.5*(v/mx)}"/>`;
    }).join('');
    return`<svg width="${w}" height="${h}" style="flex-shrink:0"><g>${bars}</g></svg>`;
  }
  function sparkGap(pct, color){
    const w=90,h=18;
    const filled=Math.round(pct/100*w);
    return`<svg width="${w}" height="${h}" style="flex-shrink:0"><rect x="0" y="6" width="${w}" height="6" rx="3" fill="rgba(255,255,255,.07)"/><rect x="0" y="6" width="${filled}" height="6" rx="3" fill="${color}"/><text x="${filled+3}" y="14" font-family="JetBrains Mono" font-size="8" fill="${color}">${pct}%</text></svg>`;
  }
  function sparkEmpty(){
    return`<svg width="90" height="18" style="flex-shrink:0"><line x1="4" y1="9" x2="86" y2="9" stroke="rgba(255,255,255,.12)" stroke-width="1.5" stroke-dasharray="4,3"/><text x="28" y="14" font-family="JetBrains Mono" font-size="8" fill="#5A5754">No data</text></svg>`;
  }

  const insightData=[
    {label:"What's Working",color:"var(--sage)",dot:"#5CB872",rows:[
      {text:"Bench: 190→ 205→ 215 lb  linear progression",spark:spark([190,205,215],'#5CB872')},
      {text:"Squat: 245→ 222→ 225 lb  consistency focus",spark:spark([245,222,225],'#D4A84B')},
      {text:"Trap Bar DL: 315→ 265→ 285 lb  recovering from Jan peak",spark:spark([315,265,285],'#5A9DC0')},
      {text:"Lat Pulldown: 150→ 185→ 170 lb  Feb peak, held Mar",spark:spark([150,185,170],'#47B0AB')},
    ]},
    {label:"Not Improving",color:"var(--gold)",dot:"#D4A84B",rows:[
      {text:"HRP: 47→ 47→ 45 reps  slight regression",spark:spark([47,47,45],'#D4A84B')},
      {text:"Gym days: 22→ 19→ 18  consistent Q1 decline",spark:sparkBar([22,19,18],'#CC6B47')},
      {text:"SDC: no timed trial data yet",spark:sparkEmpty()},
    ]},
    {label:"Needs Change",color:"var(--rust)",dot:"#CC6B47",rows:[
      {text:"Plank: at 47% of standard  needs daily work",spark:sparkGap(47,'#CC6B47')},
      {text:"2-Mile Run: no test date set yet",spark:sparkEmpty()},
      {text:"Needs scheduled trial in April  not optional",spark:sparkGap(0,'#5A5754')},

    <!-- DECISION CARDS ROW -->
    <div class="card ca d2">
      <div class="ch"><div class="ct" style="color:var(--gold)">Near-Term Decisions</div><div class="cs">Things that require an actual choice in the next 90 days</div></div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${[
          {title:'ArmyIgnited TA  close the loop',urgency:'April',col:'#E0B44E',body:'The acknowledgment of the SUNY Potsdam recoupment is in progress. This needs to clear before the Clarkson TA application can go through. Two courses × $750 = $1,500 on the line. Failing to resolve it means paying out of pocket for spring.'},
          {title:'AFT  scheduled trial dates for PLK and 2MR',urgency:'April',col:'#9A8FD8',body:'Plank is at 47% of standard  the only event below passing. The 2-Mile run has no recorded test date at all. The window is AprMay. Both events need actual practice sets on a schedule before then, not gym sets as an afterthought.'},
          {title:'Amex Platinum cancellation',urgency:'Before renewal',col:'#D9714E',body:'Decision to cancel was noted in March. The card carries a high annual fee. Execute the cancellation before the next annual charge hits. Confirm which benefits transfer to Chase Sapphire Reserve before cutting it.'},
        ].map(d=>`<div style="padding:11px 13px;background:var(--bg3);border-radius:var(--r2);border-left:3px solid ${d.col}">

      </div>

    <div class="card ca d2">
      <div class="ch"><div class="ct" style="color:var(--sky)">Education Funding Map</div><div class="cs">Clarkson benefit · ArmyIgnited · path to May 2027</div></div>

      </div>
    </div>

    <div class="card ca d2">
      <div class="ch"><div class="ct" style="color:var(--t2)">The June 2027 Question</div><div class="cs">ARNG contract end · officer route vs business route · decision architecture</div></div>

        <div style="padding:14px;background:rgba(95,173,212,.07);border:1px solid rgba(95,173,212,.2);border-radius:var(--r2)">

            ${['Temperamentally better fit than Army infantry','OTS application →  ~6 month school','Guaranteed salary, healthcare, pension at 20 yrs','MBA useful for officer career (logistics, acquisition)','Decision by Q4 2026 to allow application lead time','ARNG contract end is natural transition point'].map(t=>`<div style="font-size:11px;color:var(--t2);line-height:1.45;display:flex;gap:6px"><span style="color:var(--sky);flex-shrink:0"></span>${t}</div>`).join('')}

      ]},options:{responsive:true,maintainAspectRatio:true,

          x:{grid:{display:false},ticks:{color:'#9A9590',font:{family:'JetBrains Mono',size:10},maxTicksLimit:10},border:{display:false},title:{display:true,text:'Day of month',color:'#5A5754',font:{size:10}}},

        }
      }}));

      const dows2=['Su','Mo','Tu','We','Th','Fr','Sa'];
      let html='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';

        const col=dayCat[d]?dayCat[d].c:'#5A5754';
        const knownAmt=DAILY_SPEND[d]||0;
        const tileAmt=tot>0?`$${tot>99?Math.round(tot):tot.toFixed(0)}`:(knownAmt>0?`$${knownAmt}`:'');

    // catTrendChart removed

  }

  
  if(tab==='creative'){

  }
}

    const bg=isDrill?'rgba(139,126,200,.14)':isWork?'rgba(92,184,114,.08)':'rgba(255,255,255,.02)';
    const border=isDrill?'rgba(139,126,200,.35)':isSermon?'rgba(212,168,75,.35)':isWork?'rgba(92,184,114,.2)':'rgba(255,255,255,.06)';

    // click →  navigate to relevant tab
    let clickAction='';
    if(isSermon)clickAction=`onclick="closeCalExpand();sw('spiritual')"`;
    else if(isDrill)clickAction=`onclick="closeCalExpand();sw('physical')"`;
    else if(isGym)clickAction=`onclick="closeCalExpand();sw('physical')"`;
    else if(isSpecial)clickAction=`onclick="closeCalExpand();sw('financial')"`;

    return`<div ${clickAction} style="background:${bg};border:1px solid ${border};border-radius:8px;padding:8px 10px;min-height:80px;cursor:${clickAction?'pointer':'default'};transition:border-color .15s,transform .15s" onmouseenter="this.style.transform=this.style.cursor==='pointer'?'scale(1.02)':''" onmouseleave="this.style.transform=''">
      <div style="font-family:var(--mono);font-size:11px;font-weight:700;color:${isSermon?'#D4A84B':isDrill?'#8B7EC8':'#9A9590'};margin-bottom:5px">${d}</div>
      ${lines.join('')}
    </div>`;
  }).join('');

  content.innerHTML=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px">${dowHdr}${cells}</div>`;
  legend.innerHTML=[
    {c:'#5A9DC0',l:'CU Security Shift →  Physical'},
    {c:'#8B7EC8',l:'ARNG Drill →  Physical'},
    {c:'#5CB872',l:'Gym Workout →  Physical'},
    {c:'#D4A84B',l:'Church / Sermon →  Spiritual'},
    {c:'#47B0AB',l:'Special Event →  Financial'},
  ].map(x=>`<div style="display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;color:#9A9590"><span style="width:8px;height:8px;border-radius:50%;background:${x.c};flex-shrink:0"></span>${x.l}</div>`).join('');

  ov.style.display='block';
  document.body.style.overflow='hidden';
};
window.closeCalExpand=()=>{
  const ov=document.getElementById('calExpandOverlay');
  if(ov)ov.style.display='none';
  document.body.style.overflow='';
};

render();
document.getElementById('calExpandOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeCalExpand();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeCalExpand();
    document.getElementById('overlay')?.classList.remove('show');
    document.getElementById('muscleOverlay')?.classList.remove('show');
    document.getElementById('kbhint-panel')?.classList.remove('show');
    closeFinOverlay();
    closeWorkoutOverlay();
    closeSubsOverlay();
  }
  // Keyboard tab shortcuts: 1-6
  if(!e.ctrlKey&&!e.metaKey&&!e.altKey&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){
    const keys={'1':'overview','2':'spiritual','3':'physical','4':'financial','5':'intellectual','6':'creative'};
    if(keys[e.key]){sw(keys[e.key]);}
    // Arrow keys for prev/next tab
    if(e.key==='ArrowRight'||e.key==='ArrowLeft'){
      const idx=TABS.indexOf(tab);
      const next=e.key==='ArrowRight'?Math.min(idx+1,TABS.length-1):Math.max(idx-1,0);
      if(next!==idx)sw(TABS[next]);
    }
  }
});
// Back to top button visibility
window.addEventListener('scroll',()=>{
  const btt=document.getElementById('btt');
  if(btt)btt.classList.toggle('show',window.scrollY>300);
},{passive:true});
// Tab switch content fade + URL hash update
window.sw=t=>{
  tab=t;
  history.replaceState(null,'','#'+t);
  const c=document.getElementById('main');
  if(c){c.classList.add('switching');setTimeout(()=>c.classList.remove('switching'),250);}
  render();
  window.scrollTo({top:0,behavior:'smooth'});
};
})();
</script>

<!-- Financial Detail Overlay -->
<div id="finOverlay" style="display:none;position:fixed;inset:0;background:rgba(6,7,9,.93);backdrop-filter:blur(18px);z-index:9999;overflow-y:auto;padding:32px 24px">
  <div style="max-width:860px;margin:0 auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div id="finOverlayTitle" style="font-family:var(--serif);font-size:20px;font-weight:700;font-style:italic;color:var(--tx)">Details</div>
      <button onclick="closeFinOverlay()" style="font-family:var(--mono);font-size:11px;padding:7px 16px;border:1px solid var(--b2);border-radius:40px;background:var(--bg4);color:var(--t2);cursor:pointer;transition:all .15s">Close ×</button>
    </div>
    <div id="finOverlayBody"></div>
  </div>
</div>

<!-- Workout Detail Overlay -->
<div id="workoutOverlay" style="display:none;position:fixed;inset:0;background:rgba(6,7,9,.93);backdrop-filter:blur(18px);z-index:9999;overflow-y:auto;padding:28px 20px" onclick="if(event.target===this)closeWorkoutOverlay()">
  <div style="max-width:600px;margin:0 auto;background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh3)">
    <div style="padding:16px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between">
      <div><div id="woDate" style="font-family:var(--serif);font-size:16px;font-weight:700;font-style:italic;color:var(--tx)"></div><div id="woSub" style="font-family:var(--mono);font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.8px;margin-top:2px"></div></div>
      <button onclick="closeWorkoutOverlay()" style="font-family:var(--mono);font-size:11px;padding:5px 12px;border:1px solid var(--b2);border-radius:20px;background:none;color:var(--t3);cursor:pointer">Close ×</button>
    </div>
    <div id="woBody" style="padding:16px 20px"></div>
  </div>
</div>
<!-- Subscriptions Overlay -->
<div id="subsOverlay" style="display:none;position:fixed;inset:0;background:rgba(4,5,6,.92);backdrop-filter:blur(18px);z-index:9999;overflow-y:auto;padding:32px 24px" onclick="if(event.target===this)closeSubsOverlay()">
  <div style="max-width:720px;margin:0 auto;background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r4);overflow:hidden;box-shadow:var(--sh3);animation:modalIn .32s cubic-bezier(.22,.68,0,1.15) both">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--b1)">
      <div>
        <div style="font-family:var(--serif);font-size:18px;font-weight:700;font-style:italic;color:var(--tx)">Subscriptions Dashboard</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--t4);margin-top:3px" id="subsOverlayMeta"></div>
      </div>
      <button onclick="closeSubsOverlay()" style="font-family:var(--mono);font-size:11px;padding:7px 16px;border:1px solid var(--b2);border-radius:40px;background:var(--bg4);color:var(--t2);cursor:pointer;transition:all .18s;flex-shrink:0" onmouseover="this.style.borderColor='var(--b3)';this.style.color='var(--tx)'" onmouseout="this.style.borderColor='var(--b2)';this.style.color='var(--t2)'">Close ×</button>
    </div>
    <div id="subsOverlayBody" style="padding:20px 24px;overflow-y:auto;max-height:calc(90vh - 80px);scrollbar-width:thin;scrollbar-color:var(--bg4) transparent"></div>
  </div>
</div>

</body>
</html>
